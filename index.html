        // ─── COMMISSION ──────────────────────────────────────────────
        function recalcAllCommissions() {
            appData.staff.forEach(s => {
                s.totalCommission = 0;
                s.jobsCompleted = 0;
                s.salesGenerated = 0;
                s.weeklyBreakdown = { Sunday: 0, Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0,
                    Saturday: 0 };
                s.weeklyCommission = 0;
                s.monthlyCommission = 0;
                s.yearlyCommission = 0;
            });
            appData.commissionReports = { weekly: [], monthly: [], yearly: [] };
            const wg = {},
                mg = {},
                yg = {};
            appData.transactions.forEach(t => {
                if (!t.staffCommissions) return;
                const d = new Date(t.date),
                    wid = getWeekId(d),
                    mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
                    yk = `${d.getFullYear()}`;
                if (!wg[wid]) wg[wid] = { weekStart: getWeekStart(d).toISOString(), weekEnd: getWeekEnd(d)
                        .toISOString(), weekLabel: getWeekLabel(d), staff: {}, totals: { commission: 0,
                            sales: 0, jobs: 0, transactions: 0 }, dailyBreakdown: {} };
                if (!mg[mk]) mg[mk] = { month: mk, staff: {}, totals: { commission: 0, sales: 0, jobs: 0,
                        transactions: 0 } };
                if (!yg[yk]) yg[yk] = { year: yk, staff: {}, totals: { commission: 0, sales: 0, jobs: 0,
                        transactions: 0 } };
                const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const dn = dayNames[d.getDay()];
                if (!wg[wid].dailyBreakdown[dn]) wg[wid].dailyBreakdown[dn] = { commission: 0, sales: 0,
                    jobs: 0 };
                Object.entries(t.staffCommissions).forEach(([sid, data]) => {
                    const id = parseInt(sid),
                        st = appData.staff.find(s => s.id === id);
                    if (!st) return;
                    const comm = data.commission || 0,
                        jobs = data.jobs || 1,
                        sales = t.total || 0;
                    st.totalCommission = (st.totalCommission || 0) + comm;
                    st.jobsCompleted = (st.jobsCompleted || 0) + jobs;
                    st.salesGenerated = (st.salesGenerated || 0) + sales;
                    st.weeklyBreakdown[dn] = (st.weeklyBreakdown[dn] || 0) + comm;
                    st.weeklyCommission = (st.weeklyCommission || 0) + comm;
                    st.monthlyCommission = (st.monthlyCommission || 0) + comm;
                    st.yearlyCommission = (st.yearlyCommission || 0) + comm;
                    if (!wg[wid].staff[id]) wg[wid].staff[id] = { name: st.name, position: st.position,
                        tier: st.commissionTier, commission: 0, jobs: 0, sales: 0, daily: { Sunday: 0,
                            Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0,
                        Saturday: 0 } };
                    wg[wid].staff[id].commission += comm;
                    wg[wid].staff[id].jobs += jobs;
                    wg[wid].staff[id].sales += sales;
                    wg[wid].staff[id].daily[dn] = (wg[wid].staff[id].daily[dn] || 0) + comm;
                    wg[wid].totals.commission += comm;
                    wg[wid].totals.sales += sales;
                    wg[wid].totals.jobs += jobs;
                    wg[wid].totals.transactions += 1;
                    wg[wid].dailyBreakdown[dn].commission += comm;
                    wg[wid].dailyBreakdown[dn].sales += sales;
                    wg[wid].dailyBreakdown[dn].jobs += jobs;
                    if (!mg[mk].staff[id]) mg[mk].staff[id] = { name: st.name, position: st.position,
                        tier: st.commissionTier, commission: 0, jobs: 0, sales: 0 };
                    mg[mk].staff[id].commission += comm;
                    mg[mk].staff[id].jobs += jobs;
                    mg[mk].staff[id].sales += sales;
                    mg[mk].totals.commission += comm;
                    mg[mk].totals.sales += sales;
                    mg[mk].totals.jobs += jobs;
                    mg[mk].totals.transactions += 1;
                    if (!yg[yk].staff[id]) yg[yk].staff[id] = { name: st.name, position: st.position,
                        tier: st.commissionTier, commission: 0, jobs: 0, sales: 0 };
                    yg[yk].staff[id].commission += comm;
                    yg[yk].staff[id].jobs += jobs;
                    yg[yk].staff[id].sales += sales;
                    yg[yk].totals.commission += comm;
                    yg[yk].totals.sales += sales;
                    yg[yk].totals.jobs += jobs;
                    yg[yk].totals.transactions += 1;
                });
            });
            appData.openServices.forEach(s => {
                if (s.completedAt && s.commissionProcessed && s.pendingCommission) {
                    const d = new Date(s.completedAt),
                        wid = getWeekId(d),
                        mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
                        yk = `${d.getFullYear()}`;
                    if (!wg[wid]) wg[wid] = { weekStart: getWeekStart(d).toISOString(), weekEnd: getWeekEnd(d)
                            .toISOString(), weekLabel: getWeekLabel(d), staff: {}, totals: { commission: 0,
                                sales: 0, jobs: 0, transactions: 0 }, dailyBreakdown: {} };
                    if (!mg[mk]) mg[mk] = { month: mk, staff: {}, totals: { commission: 0, sales: 0, jobs: 0,
                            transactions: 0 } };
                    if (!yg[yk]) yg[yk] = { year: yk, staff: {}, totals: { commission: 0, sales: 0, jobs: 0,
                            transactions: 0 } };
                    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday',
                        'Saturday'];
                    const dn = dayNames[d.getDay()];
                    if (!wg[wid].dailyBreakdown[dn]) wg[wid].dailyBreakdown[dn] = { commission: 0, sales: 0,
                        jobs: 0 };
                    const map = s.pendingCommission.staffMap || {};
                    Object.entries(map).forEach(([sid, data]) => {
                        const id = parseInt(sid),
                            st = appData.staff.find(s => s.id === id);
                        if (!st) return;
                        const comm = data.commission || 0,
                            jobs = data.jobs || 1,
                            sales = s.total || 0;
                        st.totalCommission = (st.totalCommission || 0) + comm;
                        st.jobsCompleted = (st.jobsCompleted || 0) + jobs;
                        st.salesGenerated = (st.salesGenerated || 0) + sales;
                        st.weeklyBreakdown[dn] = (st.weeklyBreakdown[dn] || 0) + comm;
                        st.weeklyCommission = (st.weeklyCommission || 0) + comm;
                        st.monthlyCommission = (st.monthlyCommission || 0) + comm;
                        st.yearlyCommission = (st.yearlyCommission || 0) + comm;
                        if (!wg[wid].staff[id]) wg[wid].staff[id] = { name: st.name, position: st.position,
                            tier: st.commissionTier, commission: 0, jobs: 0, sales: 0, daily: { Sunday: 0,
                                Monday: 0, Tuesday: 0, Wednesday: 0, Thursday: 0, Friday: 0,
                            Saturday: 0 } };
                        wg[wid].staff[id].commission += comm;
                        wg[wid].staff[id].jobs += jobs;
                        wg[wid].staff[id].sales += sales;
                        wg[wid].staff[id].daily[dn] = (wg[wid].staff[id].daily[dn] || 0) + comm;
                        wg[wid].totals.commission += comm;
                        wg[wid].totals.sales += sales;
                        wg[wid].totals.jobs += jobs;
                        wg[wid].totals.transactions += 1;
                        wg[wid].dailyBreakdown[dn].commission += comm;
                        wg[wid].dailyBreakdown[dn].sales += sales;
                        wg[wid].dailyBreakdown[dn].jobs += jobs;
                        if (!mg[mk].staff[id]) mg[mk].staff[id] = { name: st.name, position: st.position,
                            tier: st.commissionTier, commission: 0, jobs: 0, sales: 0 };
                        mg[mk].staff[id].commission += comm;
                        mg[mk].staff[id].jobs += jobs;
                        mg[mk].staff[id].sales += sales;
                        mg[mk].totals.commission += comm;
                        mg[mk].totals.sales += sales;
                        mg[mk].totals.jobs += jobs;
                        mg[mk].totals.transactions += 1;
                        if (!yg[yk].staff[id]) yg[yk].staff[id] = { name: st.name, position: st.position,
                            tier: st.commissionTier, commission: 0, jobs: 0, sales: 0 };
                        yg[yk].staff[id].commission += comm;
                        yg[yk].staff[id].jobs += jobs;
                        yg[yk].staff[id].sales += sales;
                        yg[yk].totals.commission += comm;
                        yg[yk].totals.sales += sales;
                        yg[yk].totals.jobs += jobs;
                        yg[yk].totals.transactions += 1;
                    });
                }
            });
            const sortedWeeks = Object.keys(wg).sort((a, b) => new Date(wg[b].weekStart) - new Date(wg[a].weekStart));
            appData.commissionReports.weekly = sortedWeeks.map(id => wg[id]);
            const sortedMonths = Object.keys(mg).sort((a, b) => b.localeCompare(a));
            appData.commissionReports.monthly = sortedMonths.map(key => mg[key]);
            const sortedYears = Object.keys(yg).sort((a, b) => b.localeCompare(a));
            appData.commissionReports.yearly = sortedYears.map(key => yg[key]);

            const now = new Date(),
                curId = getWeekId(now);
            if (wg[curId]) appData.commissionWeekly.current = {
                weekStart: wg[curId].weekStart,
                weekEnd: wg[curId].weekEnd,
                weekLabel: wg[curId].weekLabel,
                staff: wg[curId].staff,
                totals: wg[curId].totals,
                dailyBreakdown: wg[curId].dailyBreakdown
            };
            else {
                const ws = getWeekStart(now),
                    we = getWeekEnd(now);
                appData.commissionWeekly.current = { weekStart: ws.toISOString(), weekEnd: we.toISOString(),
                    weekLabel: getWeekLabel(now), staff: {}, totals: { commission: 0, sales: 0, jobs: 0,
                        transactions: 0 }, dailyBreakdown: { Sunday: { commission: 0, sales: 0, jobs: 0 },
                        Monday: { commission: 0, sales: 0, jobs: 0 }, Tuesday: { commission: 0, sales: 0,
                            jobs: 0 }, Wednesday: { commission: 0, sales: 0, jobs: 0 }, Thursday: { commission: 0,
                            sales: 0, jobs: 0 }, Friday: { commission: 0, sales: 0, jobs: 0 },
                        Saturday: { commission: 0, sales: 0, jobs: 0 } } };
            }
            const archives = [];
            const curStart = getWeekStart(now);
            Object.keys(wg).forEach(id => {
                const ws = new Date(wg[id].weekStart);
                if (ws < curStart) archives.push({ weekStart: wg[id].weekStart, weekEnd: wg[id].weekEnd,
                    weekLabel: wg[id].weekLabel, staff: wg[id].staff, totals: wg[id].totals,
                    dailyBreakdown: wg[id].dailyBreakdown, archivedAt: new Date().toISOString() });
            });
            archives.sort((a, b) => new Date(b.weekStart) - new Date(a.weekStart));
            appData.commissionWeekly.archives = archives;
            appData.reports.weekly = appData.commissionReports.weekly;
            appData.reports.monthly = appData.commissionReports.monthly;
            appData.reports.yearly = appData.commissionReports.yearly;
            saveToLocal();
            return true;
        }

                ${panels.map(p=>`<div class="admin-sidebar-item ${currentAdminPanel===p.id?'active':''}" onclick="navigateAdmin('${p.id}')"><i class="fas ${p.icon}"></i> ${p.label}</div>`).join('')}

                ${firebaseInitialized&&isFirebasePrimary?`<div class="mt-1 text-green-400 text-[10px]">🌐 Online Mode</div>`:`<div class="mt-1 text-yellow-400 text-[10px]">⚠️ Offline Mode</div>`}
                ${isUsingDemoConfig?`<div class="mt-1 text-yellow-400 text-[10px]">⚠️ Demo Firebase config</div>`:''}
                </div></div>
                <div class="admin-content card-premium p-5">${content}</div>
            </div>`;
        }

        // ─── TRANSACTION TRACKING ────────────────────────────────────
        function getCurrentFilteredTransactions() {
            const now = new Date();
            let filtered = [];
            if (transactionFilter === 'daily') {
                const ds = now.toISOString().slice(0, 10);
                filtered = appData.transactions.filter(t => t.date.startsWith(ds));
            } else if (transactionFilter === 'weekly') {
                const ws = getCurrentWeekStart(),
                    wsStr = ws.toISOString().slice(0, 10),
                    weStr = getCurrentWeekEnd().toISOString().slice(0, 10);
                filtered = appData.transactions.filter(t => t.date >= wsStr && t.date <= weStr);
            } else if (transactionFilter === 'monthly') {
                const m = now.getMonth(),
                    y = now.getFullYear();
                filtered = appData.transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === m &&
                        d.getFullYear() === y; });
            } else if (transactionFilter === 'yearly') {
                const y = now.getFullYear();
                filtered = appData.transactions.filter(t => new Date(t.date).getFullYear() === y);
            } else if (transactionFilter === 'custom' && dateRangeStart && dateRangeEnd) {
                filtered = appData.transactions.filter(t => t.date >= dateRangeStart && t.date <= dateRangeEnd);
            } else filtered = [...appData.transactions];
            if (filterStaff !== 'all') filtered = filtered.filter(t => t.items.flatMap(i => i.assignedStaff?.map(s => s
                .name) || []).some(n => n === filterStaff));
            if (filterService !== 'all') filtered = filtered.filter(t => t.items.map(i => i.serviceName).some(s => s ===
                filterService));
            if (filterPayment !== 'all') filtered = filtered.filter(t => t.paymentMethod === filterPayment);
            if (searchQuery) { const q = searchQuery.toLowerCase();
                filtered = filtered.filter(t => t.id.toLowerCase().includes(q) || (t.customer && t.customer
                    .toLowerCase().includes(q)) || (t.vehicle && t.vehicle.toLowerCase().includes(q)) || (t
                    .plate && t.plate.toLowerCase().includes(q)) || t.items.some(i => i.serviceName
                    .toLowerCase().includes(q))); }
            filtered.sort((a, b) => {
                let va, vb;
                if (sortColumn === 'date') { va = new Date(a.date);
                    vb = new Date(b.date); } else if (sortColumn === 'total') { va = a.total || 0;
                    vb = b.total || 0; } else if (sortColumn === 'customer') { va = (a.customer || '').toLowerCase();
                    vb = (b.customer || '').toLowerCase(); } else if (sortColumn === 'id') { va = a.id || '';
                    vb = b.id || ''; } else if (sortColumn === 'payment') { va = a.paymentMethod || '';
                    vb = b.paymentMethod || ''; } else { va = new Date(a.date);
                    vb = new Date(b.date); }
                if (va < vb) return sortDirection === 'asc' ? -1 : 1;
                if (va > vb) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            return filtered;
        }

        function renderTransactionTracking() {

            const filtered = getCurrentFilteredTransactions();
            const totalPages = Math.ceil(filtered.length / pageSize);

            const summary = computeTransactionSummary(filtered);

                s.name) || [])))];
            const allSvcs = [...new Set(appData.transactions.flatMap(t => t.items.map(i => i.serviceName)))];
            const allPayments = [...new Set(appData.transactions.map(t => t.paymentMethod).filter(Boolean))];

            let rows = paginated.map((t, i) => {
                const staffNames = t.items.flatMap(i => i.assignedStaff?.map(s => s.name) || []).filter((v, idx,

                const isCredit = t.paymentMethod === 'Credit (Utang)' || t.isCredit;

                    <td class="editable-field" onclick="editTxField('${t.id}','payment')">${isCredit?`<span class="badge badge-credit">CREDIT</span>`:`<span class="badge badge-done">${t.paymentMethod||'Cash'}</span>`}</td>

                    <td class="text-xs">${t.remarks||''}</td>
                    <td><div class="column-actions"><button onclick="viewTxDetail('${t.id}')" class="action-btn bg-purple-600 text-white"><i class="fas fa-eye"></i></button><button onclick="openTxEdit('${t.id}')" class="action-btn bg-cyan-600 text-white"><i class="fas fa-edit"></i></button><button onclick="printTxReceipt('${t.id}')" class="action-btn bg-green-600 text-white"><i class="fas fa-print"></i></button><button onclick="deleteTx('${t.id}')" class="action-btn bg-red-600 text-white"><i class="fas fa-trash"></i></button></div></td>
                </tr>`;
            }).join('');

            let pgHtml = '';
            if (totalPages > 1) {
                const maxVis = 7;
                let sp = Math.max(1, currentPage - Math.floor(maxVis / 2));
                let ep = Math.min(totalPages, sp + maxVis - 1);
                if (ep - sp < maxVis - 1) sp = Math.max(1, ep - maxVis + 1);
                pgHtml = `<div class="flex gap-1 mt-2 flex-wrap justify-center">
                    <button class="pagination-btn" onclick="changePage(1)" ${currentPage<=1?'disabled':''}><i class="fas fa-angle-double-left"></i></button>
                    <button class="pagination-btn" onclick="changePage(${currentPage-1})" ${currentPage<=1?'disabled':''}><i class="fas fa-angle-left"></i></button>
                    ${Array.from({length:ep-sp+1},(_,i)=>{const p=sp+i;return `<button class="pagination-btn ${p===currentPage?'active':''}" onclick="changePage(${p})">${p}</button>`;}).join('')}
                    <button class="pagination-btn" onclick="changePage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}><i class="fas fa-angle-right"></i></button>
                    <button class="pagination-btn" onclick="changePage(${totalPages})" ${currentPage>=totalPages?'disabled':''}><i class="fas fa-angle-double-right"></i></button>
                </div>`;
            }

            const filterHtml = `<div class="filter-panel">
                <input type="text" placeholder="🔍 Search..." class="search-input text-sm flex-1 min-w-[120px]" id="globalSearch" value="${searchQuery}" oninput="updateSearch(this.value)">
                <select id="filterPeriod" class="text-sm" onchange="applyFilters()">
                    <option value="daily" ${transactionFilter==='daily'?'selected':''}>Daily</option>
                    <option value="weekly" ${transactionFilter==='weekly'?'selected':''}>Weekly</option>
                    <option value="monthly" ${transactionFilter==='monthly'?'selected':''}>Monthly</option>
                    <option value="yearly" ${transactionFilter==='yearly'?'selected':''}>Yearly</option>
                    <option value="custom" ${transactionFilter==='custom'?'selected':''}>Custom</option>
                </select>
                <input type="date" id="dateStart" class="text-sm" value="${dateRangeStart}" onchange="applyFilters()">
                <input type="date" id="dateEnd" class="text-sm" value="${dateRangeEnd}" onchange="applyFilters()">
                <select id="filterStaff" class="text-sm" onchange="applyFilters()"><option value="all">All Staff</option>${allStaff.map(s=>`<option value="${s}" ${filterStaff===s?'selected':''}>${s}</option>`).join('')}</select>
                <select id="filterService" class="text-sm" onchange="applyFilters()"><option value="all">All Services</option>${allSvcs.map(s=>`<option value="${s}" ${filterService===s?'selected':''}>${s}</option>`).join('')}</select>
                <select id="filterPayment" class="text-sm" onchange="applyFilters()"><option value="all">All Payments</option>${allPayments.map(p=>`<option value="${p}" ${filterPayment===p?'selected':''}>${p}</option>`).join('')}</select>
                <button onclick="applyFilters()" class="bg-cyan-600 px-3 py-1 rounded text-sm"><i class="fas fa-filter"></i> Apply</button>
                <button onclick="clearFilters()" class="bg-gray-600 px-3 py-1 rounded text-sm"><i class="fas fa-times"></i> Clear</button>
                <button onclick="showAddTxModal()" class="bg-green-600 px-3 py-1 rounded text-sm"><i class="fas fa-plus"></i> Add</button>
            </div>`;

            const vehicleSearchHtml = `<div class="flex gap-2 items-center mt-2 flex-wrap">
                <span class="text-xs text-gray-400"><i class="fas fa-car"></i> Vehicle History:</span>
                <input type="text" placeholder="Enter plate..." id="vSearchInput" class="search-input text-sm" style="min-width:150px;">
                <button onclick="searchVehicle()" class="bg-purple-600 px-3 py-1 rounded text-sm"><i class="fas fa-search"></i> Search</button>
                <span id="vSearchResult" class="text-xs text-gray-400"></span>
            </div>`;

            return `<div class="card-premium p-6">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                    <div><h2 class="text-2xl font-bold"><i class="fas fa-exchange-alt"></i> Transaction Tracking</h2>
                    <p class="text-sm text-gray-400">${filtered.length} transactions</p></div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="exportFilteredExcel()" class="action-btn bg-[#2ea043] text-white"><i class="fas fa-file-excel"></i> Excel</button>
                        <button onclick="exportFilteredPDF()" class="action-btn bg-[#f85149] text-white"><i class="fas fa-file-pdf"></i> PDF</button>
                        <button onclick="exportFilteredCSV()" class="action-btn bg-[#58a6ff] text-white"><i class="fas fa-file-csv"></i> CSV</button>
                        <button onclick="printFiltered()" class="action-btn bg-[#bc8cff] text-white"><i class="fas fa-print"></i> Print</button>
                    </div>
                </div>
                ${filterHtml}
                ${vehicleSearchHtml}
                <div class="table-wrap mt-3"><table><thead><tr>
                    <th class="text-center sortable ${sortColumn==='id'?sortDirection:''}" onclick="sortTable('id')">#</th>
                    <th class="sortable ${sortColumn==='id'?sortDirection:''}" onclick="sortTable('id')">Receipt</th>
                    <th class="sortable ${sortColumn==='date'?sortDirection:''}" onclick="sortTable('date')">Date</th>
                    <th class="sortable ${sortColumn==='customer'?sortDirection:''}" onclick="sortTable('customer')">Customer</th>
                    <th>Vehicle</th><th>Plate</th><th>Size</th><th>Service</th><th>Staff</th>
                    <th class="text-right sortable ${sortColumn==='total'?sortDirection:''}" onclick="sortTable('total')">Amount</th>
                    <th class="sortable ${sortColumn==='payment'?sortDirection:''}" onclick="sortTable('payment')">Payment</th>
                    <th class="text-right">Commission</th><th>Remark</th><th class="text-center">Actions</th>
                </tr></thead><tbody>${rows||'<tr><td colspan="14" class="text-center py-8 text-gray-400">No transactions</td></tr>'}</tbody>
                <tfoot class="border-t-2 border-cyan-400 font-bold"><tr><td colspan="9" class="py-2 text-right">TOTALS:</td><td class="text-right text-green-400">₱${summary.grossSales.toFixed(2)}</td><td colspan="4"></td></tr></tfoot></table></div>
                ${pgHtml}
                <div class="mt-4"><h4 class="text-sm font-bold text-cyan-400 mb-2"><i class="fas fa-chart-bar"></i> Summary</h4>

                    <div class="summary-item"><div class="s-label">Cash</div><div class="s-value green">₱${summary.cashPayments.toFixed(2)}</div></div>
                    <div class="summary-item"><div class="s-label">GCash</div><div class="s-value cyan">₱${summary.gcashPayments.toFixed(2)}</div></div>
                    <div class="summary-item"><div class="s-label">Credit</div><div class="s-value orange">${summary.creditTransactions}</div></div>
                    <div class="summary-item"><div class="s-label">Discount</div><div class="s-value red">₱${summary.totalDiscount.toFixed(2)}</div></div>
                    <div class="summary-item"><div class="s-label">Commission</div><div class="s-value purple">₱${summary.totalCommission.toFixed(2)}</div></div>
                    <div class="summary-item"><div class="s-label">Average</div><div class="s-value yellow">₱${summary.averageValue.toFixed(2)}</div></div>
                    <div class="summary-item"><div class="s-label">Highest</div><div class="s-value pink">₱${summary.highestAmount.toFixed(2)}</div></div>
                    <div class="summary-item"><div class="s-label">Lowest</div><div class="s-value red">₱${summary.lowestAmount.toFixed(2)}</div></div>
                </div></div>
            </div>`;
        }

        window.updateSearch = function(v) { searchQuery = v;
            currentPage = 1;
            renderApp(); };

            const fp = document.getElementById('filterPeriod');
            const fs = document.getElementById('filterStaff');
            const fsvc = document.getElementById('filterService');
            const fpay = document.getElementById('filterPayment');
            const ds = document.getElementById('dateStart');
            const de = document.getElementById('dateEnd');
            if (fp) transactionFilter = fp.value;
            if (fs) filterStaff = fs.value;
            if (fsvc) filterService = fsvc.value;
            if (fpay) filterPayment = fpay.value;
            if (ds) dateRangeStart = ds.value;
            if (de) dateRangeEnd = de.value;
            currentPage = 1;
            renderApp();
        };
        window.clearFilters = function() {
            searchQuery = '';
            transactionFilter = 'daily';
            filterStaff = 'all';
            filterService = 'all';
            filterPayment = 'all';
            dateRangeStart = '';
            dateRangeEnd = '';
            currentPage = 1;
            renderApp();
        };
        window.changePage = function(p) { const total = Math.ceil(getCurrentFilteredTransactions().length / pageSize); if (
                p < 1 || p > total) return;
            currentPage = p;
            renderApp(); };
        window.sortTable = function(col) {
            if (sortColumn === col) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            else { sortColumn = col;
                sortDirection = 'asc'; }
            renderApp();
        };
        window.searchVehicle = function() {
            const plate = document.getElementById('vSearchInput')?.value?.trim();
            if (!plate) { document.getElementById('vSearchResult').textContent = 'Enter a plate number.'; return; }
            const results = appData.transactions.filter(t => t.plate && t.plate.toUpperCase() === plate.toUpperCase());
            const el = document.getElementById('vSearchResult');
            if (!results.length) { el.textContent = 'No records found for ' + plate.toUpperCase(); return; }
            const total = results.reduce((s, t) => s + t.total, 0);
            const svcs = [...new Set(results.flatMap(t => t.items.map(i => i.serviceName)))];
            el.innerHTML =
                `<span class="text-green-400">${results.length} visits | ₱${total.toFixed(2)} spent | ${svcs.join(', ')}</span>`;
        };

        // ─── TRANSACTION EDIT ────────────────────────────────────────
        window.editTxField = function(id, field) {
            const t = appData.transactions.find(tx => tx.id === id);
            if (!t) return;
            const labels = { customer: 'Customer', vehicle: 'Vehicle Model', plate: 'Plate', total: 'Total Amount',
                payment: 'Payment Method' };
            const val = prompt(`Edit ${labels[field]}:`, t[field] || '');
            if (val === null) return;
            if (field === 'total') { const num = parseFloat(val); if (isNaN(num) || num <= 0) { alert('Invalid amount.');
                    return; }
                t.total = num;
                t.subtotal = num; } else if (field === 'payment') {
                const methods = appData.systemSettings.defaultPaymentMethods || ['Cash', 'GCash', 'Maya', 'Credit Card',
                    'Bank Transfer', 'Credit (Utang)'
                ];
                if (!methods.includes(val)) { alert('Payment must be one of: ' + methods.join(', ')); return; }
                const old = t.paymentMethod;
                t.paymentMethod = val;
                if (val === 'Credit (Utang)' && old !== 'Credit (Utang)') {
                    t.isCredit = true;
                    if (!appData.credits.some(c => c.transactionId === t.id)) {
                        appData.credits.push({ id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds
                                .credit++), customerName: t.customer, contact: '', transactionId: t.id,
                            amount: t.total, paid: 0, balance: t.total, date: new Date(t.date).toISOString()
                                .slice(0, 10), status: 'pending' });
                    }
                }
            } else { t[field] = val; }
            saveToLocal();
            updateTransactionReports(t);
            refreshAllCommissions();
            renderApp();
        };

        window.openTxEdit = function(id) {
            const t = appData.transactions.find(tx => tx.id === id);

                'Bank Transfer', 'Credit (Utang)'

                    <div><label class="text-gray-400">Amount</label><input type="number" id="editTxAmt" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded" value="${t.total}" step="0.01"></div>
                    <div><label class="text-gray-400">Vehicle</label><input type="text" id="editTxVeh" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded" value="${t.vehicle}"></div>
                    <div><label class="text-gray-400">Plate</label><input type="text" id="editTxPlate" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded" value="${t.plate}"></div>
                    <div><label class="text-gray-400">Payment</label><select id="editTxPay" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded">${methods.map(m=>`<option ${t.paymentMethod===m?'selected':''}>${m}</option>`).join('')}</select></div>
                    <div><label class="text-gray-400">Remarks</label><input type="text" id="editTxRem" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded" value="${t.remarks||''}"></div>
                    <div class="flex gap-3 mt-4"><button onclick="confirmEditTx('${id}')" class="btn-primary flex-1">Update</button><button onclick="closeAdminModal()" class="btn-secondary flex-1">Cancel</button></div>
                </div>
            </div></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        };

        window.confirmEditTx = function(id) {
            const t = appData.transactions.find(tx => tx.id === id);
            if (!t) return;
            const cust = document.getElementById('editTxCust')?.value;
            const amt = parseFloat(document.getElementById('editTxAmt')?.value);
            const veh = document.getElementById('editTxVeh')?.value;
            const plate = document.getElementById('editTxPlate')?.value;
            const pay = document.getElementById('editTxPay')?.value;
            const rem = document.getElementById('editTxRem')?.value;
            if (cust) t.customer = cust;

        window.editCredit = function(id, field) {
            const c = appData.credits.find(cr => cr.id === id);
            if (!c) return;
            const labels = { customerName: 'Customer', contact: 'Contact', amount: 'Amount', paid: 'Paid' };

                        'Invalid amount.'); return; }
                c[field] = num;
                c.balance = c.amount - (c.paid || 0); } else { c[field] = val; }

            saveToLocal();

        };

        window.addCreditPayment = function(id) {
            const c = appData.credits.find(cr => cr.id === id);
            if (!c) return;
            const amt = parseFloat(prompt(`Payment amount for ${c.customerName} (Balance: ₱${(c.balance||0).toFixed(2)}):`));
            if (isNaN(amt) || amt <= 0) return;
            if (amt > (c.balance || 0)) { alert('Amount exceeds balance.'); return; }
            c.paid = (c.paid || 0) + amt;
            c.balance = c.amount - c.paid;
            if (c.balance <= 0) c.status = 'paid';
            else c.status = 'partial';
            addActivityLog('Credit Payment', `${c.customerName} - ₱${amt.toFixed(2)}`);
            saveToLocal();
            renderApp();
        };

        window.saveFirebaseConfig = function() {
            const cfg = {
                apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
                authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
                databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
                projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
                storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
                messagingSenderId: document.getElementById('fbSenderId')?.value?.trim() || '',
                appId: document.getElementById('fbAppId')?.value?.trim() || ''
            };
            if (!cfg.apiKey || !cfg.databaseURL) { alert("API Key and Database URL required."); return; }
            firebaseConfig = cfg;
            localStorage.setItem("8068_firebase_config_v8", JSON.stringify(cfg));
            isUsingDemoConfig = false;
            try {
                if (firebaseApp) { try { firebaseApp.delete(); } catch (_) {} }
                firebaseApp = null;
                firebaseDb = null;
                firebaseInitialized = false;
                isFirebasePrimary = false;
                firebaseListeners.forEach(ref => { try { ref.off(); } catch (_) {} });
                firebaseListeners = [];
                initFirebase().then((ok) => { if (ok) { setupRealtimeListener();
                        closeAdminModal();
                        renderApp();
                        alert("✅ Firebase connected!"); } else { alert("❌ Failed to connect."); } });
            } catch (e) { alert("❌ Firebase error: " + e.message); }
        };

        window.testFirebaseConfig = function() {
            const cfg = {
                apiKey: document.getElementById('fbApiKey')?.value?.trim() || '',
                authDomain: document.getElementById('fbAuthDomain')?.value?.trim() || '',
                databaseURL: document.getElementById('fbDbUrl')?.value?.trim() || '',
                projectId: document.getElementById('fbProjectId')?.value?.trim() || '',
                storageBucket: document.getElementById('fbStorageBucket')?.value?.trim() || '',
                messagingSenderId: document.getElementById('fbSenderId')?.value?.trim() || '',
                appId: document.getElementById('fbAppId')?.value?.trim() || ''
            };
            if (!cfg.apiKey || !cfg.databaseURL) { alert("API Key and Database URL required."); return; }
            try {
                let testApp;
                try { testApp = firebase.initializeApp(cfg, 'testApp'); } catch (e) { testApp = firebase.app(
                    'testApp'); }
                const testDb = firebase.database(testApp);
                testDb.ref('_test_connection').set({ test: 'connection', timestamp: new Date().toISOString() })
                    .then(() => { alert("✅ Connection successful!"); testDb.ref('_test_connection').remove(); try {
                            firebase.app('testApp').delete(); } catch (_) {} })
                    .catch((err) => { alert("❌ Failed: " + err.message); try { firebase.app('testApp').delete(); } catch (
                            _) {} });
            } catch (e) { alert("❌ Error: " + e.message); }
        };

        // ─── FEEDBACK (Admin) ────────────────────────────────────────
        function renderAdminFeedback() {
            if (showLogin) return renderLogin();
            if (!hasRole(['Owner', 'Manager'])) {
                return `<div class="glass p-8 text-center"><i class="fas fa-lock text-4xl text-red-400 mb-4"></i><p class="text-xl">Access Denied. Manager or Owner required.</p></div>`;
            }
            let all = getAllFeedback();
            if (feedbackSearchQuery) {
                const q = feedbackSearchQuery.toLowerCase();
                all = all.filter(f => (f.receiptNumber && f.receiptNumber.toLowerCase().includes(q)) || (f
                    .transactionId && f.transactionId.toLowerCase().includes(q)) || (f.customerName && f
                    .customerName.toLowerCase().includes(q)) || (f.vehicleModel && f.vehicleModel.toLowerCase()
                    .includes(q)) || (f.plateNumber && f.plateNumber.toLowerCase().includes(q)) || (f
                    .serviceAvailed && f.serviceAvailed.toLowerCase().includes(q)) || (f.assignedStaff && f
                    .assignedStaff.toLowerCase().includes(q)) || (f.comment && f.comment.toLowerCase().includes(
                    q)));
            }
            if (feedbackFilterRating !== 'all') all = all.filter(f => (f.rating || 0) === parseInt(feedbackFilterRating));
            if (feedbackFilterStatus !== 'all') all = all.filter(f => f.status === feedbackFilterStatus);
            if (feedbackFilterStaff !== 'all') all = all.filter(f => f.assignedStaff && f.assignedStaff.includes(
                feedbackFilterStaff));
            all.sort((a, b) => new Date(b.submissionDate) - new Date(a.submissionDate));
            const total = all.length;
            const totalPages = Math.ceil(total / feedbackPageSize);
            const start = (feedbackCurrentPage - 1) * feedbackPageSize;
            const paginated = all.slice(start, start + feedbackPageSize);
            const stats = getFeedbackStats();

            const staffPerf = getStaffPerformanceFromFeedback();
            const topStaff = staffPerf.slice(0, 5);
            const svcAnalytics = getServiceAnalyticsFromFeedback();
            const topSvc = svcAnalytics.slice(0, 5);

            const allStaffNames = [...new Set(all.map(f => f.assignedStaff).filter(Boolean).flatMap(s => s.split(',').map(
                n => n.trim())))];
            const staffFilterOpts = allStaffNames.map(n =>
                `<option value="${n}" ${feedbackFilterStaff===n?'selected':''}>${n}</option>`).join('');

            let rows = paginated.map((f, i) => {
                const rating = f.rating || 0;
                const cls = rating >= 4 ? 'good' : rating >= 3 ? 'average' : 'poor';
                const commentShort = f.comment ? (f.comment.length > 40 ? f.comment.substring(0, 40) + '...' : f
                    .comment) : '—';
                return `<tr class="border-b border-[#30363d] hover:bg-[#161b22] transition">
                    <td class="py-2 text-center text-xs text-gray-400">${start+i+1}</td>
                    <td class="font-mono text-xs"><span class="text-cyan-400 cursor-pointer" onclick="viewFeedbackDetail('${f.id}')">${f.receiptNumber||f.transactionId||'N/A'}</span></td>
                    <td class="text-xs">${f.submissionDate?new Date(f.submissionDate).toLocaleString():'N/A'}</td>
                    <td>${f.customerName||'Anonymous'}</td>
                    <td class="text-xs">${f.vehicleModel||'N/A'}</td>
                    <td class="text-xs">${f.plateNumber||'N/A'}</td>
                    <td class="text-xs">${f.serviceAvailed||'N/A'}</td>
                    <td class="text-xs">${f.assignedStaff||'N/A'}</td>
                    <td class="text-center"><span class="rating-badge ${cls}">${rating}★</span></td>
                    <td class="text-center emoji-display">${f.emojiRating||''}</td>
                    <td class="text-xs max-w-xs truncate" title="${f.comment||''}">${commentShort}</td>
                    <td class="text-center"><span class="badge ${f.status==='new'?'badge-pending':'badge-done'}">${f.status||'new'}</span></td>
                    <td><div class="column-actions"><button onclick="viewFeedbackDetail('${f.id}')" class="action-btn bg-purple-600 text-white"><i class="fas fa-eye"></i></button><button onclick="markFeedbackRead('${f.id}')" class="action-btn bg-cyan-600 text-white"><i class="fas fa-check"></i></button><button onclick="printSingleFeedback('${f.id}')" class="action-btn bg-green-600 text-white"><i class="fas fa-print"></i></button><button onclick="deleteFeedback('${f.id}')" class="action-btn bg-red-600 text-white"><i class="fas fa-trash"></i></button></div></td>
                </tr>`;
            }).join('');

            let pgHtml = '';
            if (totalPages > 1) {
                pgHtml = `<div class="flex gap-1 mt-4 flex-wrap justify-center">
                    <button class="pagination-btn" onclick="feedbackPage(1)" ${feedbackCurrentPage<=1?'disabled':''}>First</button>
                    <button class="pagination-btn" onclick="feedbackPage(${feedbackCurrentPage-1})" ${feedbackCurrentPage<=1?'disabled':''}>Prev</button>
                    ${Array.from({length:Math.min(totalPages,7)},(_,i)=>{const p=i+1;return `<button class="pagination-btn ${p===feedbackCurrentPage?'active':''}" onclick="feedbackPage(${p})">${p}</button>`;}).join('')}
                    <button class="pagination-btn" onclick="feedbackPage(${feedbackCurrentPage+1})" ${feedbackCurrentPage>=totalPages?'disabled':''}>Next</button>
                    <button class="pagination-btn" onclick="feedbackPage(${totalPages})" ${feedbackCurrentPage>=totalPages?'disabled':''}>Last</button>
                </div>`;
            }

            let staffRows = topStaff.map((s, i) => `
                <tr class="border-b border-[#30363d] hover:bg-[#161b22] transition">
                    <td class="py-1 text-center text-gray-400">${i+1}</td>
                    <td class="font-semibold">${s.name}</td>
                    <td class="text-center">${s.totalServices}</td>
                    <td class="text-center text-yellow-400 font-bold">${s.averageRating?s.averageRating.toFixed(1):'0'}★</td>
                    <td class="text-center text-green-400">${s.positiveFeedback}</td>
                    <td class="text-center text-red-400">${s.negativeFeedback}</td>
                </tr>
            `).join('');

            let svcRows = topSvc.map((s, i) => `
                <tr class="border-b border-[#30363d] hover:bg-[#161b22] transition">
                    <td class="py-1 text-center text-gray-400">${i+1}</td>

        function renderFeedbackForm(receiptNumber) {
            let tx = null,
                existing = null,
                already = false;
            if (receiptNumber) {
                tx = appData.transactions.find(t => t.id === receiptNumber);
                existing = appData.feedback ? appData.feedback.find(f => f.transactionId === receiptNumber || f
                    .receiptNumber === receiptNumber) : null;
                already = !!existing;
            }
            if (!receiptNumber && !tx) {
                return `<div class="min-h-[80vh] flex items-center justify-center p-4">
                    <div class="glass max-w-md w-full p-8 text-center">
                        ${appData.systemSettings.companyLogo?`<img src="${appData.systemSettings.companyLogo}" class="mx-auto max-h-16 mb-4 rounded-lg">`:''}

                        <p class="text-sm text-gray-400 mt-4">Enter your receipt number</p>
                        <div class="flex gap-2 mt-2"><input type="text" id="fbReceiptInput" placeholder="e.g. INV-2024-000123" class="flex-1 bg-[#0d1117] border border-[#30363d] p-3 rounded-lg text-white"><button onclick="submitFeedbackReceipt()" class="btn-primary"><i class="fas fa-search"></i> Find</button></div>
                        <div class="text-xs text-gray-500 mt-4"><p>QR Code on your receipt contains your receipt number</p></div>
                    </div>
                </div>`;
            }
            if (!tx) {
                return `<div class="min-h-[80vh] flex items-center justify-center p-4">
                    <div class="glass max-w-md w-full p-8 text-center"><div class="text-5xl mb-4">🔍</div><h3 class="text-xl font-bold text-red-400">Receipt Not Found</h3><p class="text-gray-400 mt-2">Please verify your receipt number.</p><button onclick="navigateFeedback()" class="btn-primary mt-4 px-6 py-2">Go Back</button></div>
                </div>`;
            }
            if (already) {
                return `<div class="min-h-[80vh] flex items-center justify-center p-4">
                    <div class="glass max-w-md w-full p-8 text-center"><div class="text-5xl mb-4">📝</div><h3 class="text-xl font-bold text-yellow-400">Already Submitted</h3><p class="text-gray-400 mt-2">You already submitted feedback for this transaction.</p>
                    <div class="glass-light p-4 mt-4 text-left"><div class="flex items-center gap-2"><span class="icon"><i class="fas fa-star"></i></span><span class="font-bold">${existing.rating||0}★</span><span>${existing.emojiRating||''}</span></div><div class="text-sm text-gray-300">${existing.comment||'No comment'}</div><div class="text-xs text-gray-500 mt-2">${new Date(existing.submissionDate).toLocaleString()}</div></div>
                    <button onclick="navigateFeedback()" class="btn-primary mt-4 px-6 py-2">Go Back</button></div>
                </div>`;
            }

            const txDetails = `
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between border-b border-[#30363d] pb-1"><span class="text-gray-400">Receipt</span><span class="text-cyan-400">${tx.id}</span></div>
                    <div class="flex justify-between border-b border-[#30363d] pb-1"><span class="text-gray-400">Date</span><span>${new Date(tx.date).toLocaleString()}</span></div>
                    <div class="flex justify-between border-b border-[#30363d] pb-1"><span class="text-gray-400">Customer</span><span>${tx.customer}</span></div>
                    <div class="flex justify-between border-b border-[#30363d] pb-1"><span class="text-gray-400">Vehicle</span><span>${tx.vehicle} | ${tx.plate}</span></div>
                    <div class="flex justify-between border-b border-[#30363d] pb-1"><span class="text-gray-400">Service</span><span>${tx.items.map(i=>i.serviceName).join(', ')}</span></div>
                    <div class="flex justify-between border-b border-[#30363d] pb-1"><span class="text-gray-400">Staff</span><span>${tx.items.flatMap(i=>i.assignedStaff?.map(s=>s.name)||[]).filter((v,i,a)=>a.indexOf(v)===i).join(', ')||'N/A'}</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Total</span><span class="text-green-400">₱${tx.total.toFixed(2)}</span></div>
                </div>
            `;

            return `<div class="min-h-[80vh] flex items-center justify-center p-4">
                <div class="glass max-w-lg w-full p-6 md:p-8">
                    <div class="text-center mb-6">${appData.systemSettings.companyLogo?`<img src="${appData.systemSettings.companyLogo}" class="mx-auto max-h-16 mb-3 rounded-lg">`:''}
                        <h2 class="text-2xl font-bold accent">${appData.systemSettings.companyName}</h2>
                        <p class="text-cyan-400 text-sm mt-1"><i class="fas fa-star"></i> Customer Feedback</p>
                        <p class="text-xs text-gray-500 mt-1">Receipt: ${tx.id}</p>
                    </div>
                    <div class="glass-light p-4 mb-4 rounded-lg">${txDetails}</div>
                    <form id="fbForm" onsubmit="handleFeedbackSubmit(event)">
                        <input type="hidden" id="fbTxId" value="${tx.id}">
                        <div class="form-group mb-3"><label class="form-label text-sm text-gray-400"><i class="fas fa-star text-yellow-400"></i> Rate Your Experience</label>
                            <div class="star-rating" id="starRating">${[1,2,3,4,5].map(n=>`<span class="star" data-value="${n}" onclick="selectStar(${n})">★</span>`).join('')}</div>
                            <input type="hidden" id="fbRating" value="0">
                        </div>
                        <div class="form-group mb-3"><label class="form-label text-sm text-gray-400"><i class="fas fa-smile"></i> How do you feel?</label>
                            <div class="emoji-rating">${['😡','🙁','😐','🙂','😍'].map((e,i)=>`<button type="button" class="emoji-btn" data-value="${i+1}" data-emoji="${e}" onclick="selectEmoji(${i+1})">${e}</button>`).join('')}</div>
                            <input type="hidden" id="fbEmoji" value="">
                        </div>
                        <div class="form-group mb-3"><label class="form-label text-sm text-gray-400"><i class="fas fa-comment"></i> Comments</label>
                            <textarea id="fbComment" class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg text-white" rows="4" placeholder="Tell us about your experience..."></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="form-label text-sm text-gray-400">Your Name</label><input type="text" id="fbName" class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg text-white" placeholder="Juan Dela Cruz" value="${tx.customer!=='Walk-in Customer'?tx.customer:''}"></div>
                            <div><label class="form-label text-sm text-gray-400">Contact</label><input type="text" id="fbContact" class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg text-white" placeholder="09171234567"></div>
                        </div>
                        <div class="flex items-center gap-2 mb-4"><input type="checkbox" id="fbAgree" class="w-4 h-4 accent-cyan-500" checked><label for="fbAgree" class="text-sm text-gray-400 cursor-pointer">I agree my feedback may be used to improve services.</label></div>
                        <div class="flex gap-3"><button type="submit" class="btn-primary flex-1"><i class="fas fa-paper-plane"></i> Submit</button><button type="reset" class="btn-secondary flex-1" onclick="resetFeedbackForm()"><i class="fas fa-undo"></i> Reset</button></div>
                    </form>
                    <div class="text-center text-xs text-gray-500 mt-4"><button onclick="navigateFeedback()" class="text-cyan-400 hover:text-cyan-300">← Go Back</button></div>
                </div>
            </div>`;
        }

        window.selectStar = function(v) {
            document.querySelectorAll('.star').forEach((el, i) => el.classList.toggle('active', i < v));
            document.getElementById('fbRating').value = v;
        };

        window.selectEmoji = function(v) {
            document.querySelectorAll('.emoji-btn').forEach(el => el.classList.toggle('active', parseInt(el.dataset
                .value) === v));
            document.getElementById('fbEmoji').value = document.querySelector('.emoji-btn.active')?.dataset.emoji || '';
        };

        window.resetFeedbackForm = function() {
            document.querySelectorAll('.star').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.emoji-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('fbRating').value = '0';
            document.getElementById('fbEmoji').value = '';
            document.getElementById('fbComment').value = '';
            document.getElementById('fbName').value = '';
            document.getElementById('fbContact').value = '';
            document.getElementById('fbAgree').checked = true;
        };

        window.handleFeedbackSubmit = function(e) {
            e.preventDefault();
            const txId = document.getElementById('fbTxId')?.value;
            const rating = parseInt(document.getElementById('fbRating')?.value || 0);
            const emoji = document.getElementById('fbEmoji')?.value || '';
            const comment = document.getElementById('fbComment')?.value?.trim() || '';
            const name = document.getElementById('fbName')?.value?.trim() || '';
            const contact = document.getElementById('fbContact')?.value?.trim() || '';
            const agree = document.getElementById('fbAgree')?.checked || false;
            if (rating === 0) { alert("Please rate your experience."); return; }
            if (!emoji) { alert("Please select an emoji."); return; }
            const existing = appData.feedback ? appData.feedback.find(f => f.transactionId === txId || f
                .receiptNumber === txId) : null;
            if (existing) { alert("Feedback already submitted."); return; }
            const result = submitFeedback(txId, name, contact, rating, emoji, comment, agree);
            if (result.success) {
                const main = document.getElementById("mainContent");
                if (main) main.innerHTML = renderFeedbackThankYou(result.feedback);
            } else { alert(result.message || "Failed to submit."); }
        };

        window.submitFeedbackReceipt = function() {
            const input = document.getElementById('fbReceiptInput');
            const receipt = input?.value?.trim();
            if (!receipt) { alert("Enter a receipt number."); return; }
            const main = document.getElementById("mainContent");
            if (main) main.innerHTML = renderFeedbackForm(receipt);
            const url = new URL(window.location);
            url.searchParams.set('receipt', receipt);
            window.history.pushState({}, '', url);
        };

        window.navigateFeedback = function(receipt) {
            const main = document.getElementById("mainContent");
            if (main) main.innerHTML = renderFeedbackForm(receipt);
            const url = new URL(window.location);
            if (receipt) url.searchParams.set('receipt', receipt);
            else url.searchParams.delete('receipt');
            window.history.pushState({}, '', url);
        };

        function renderFeedbackThankYou(fb) {
            const rating = fb.rating || 0;
            const emoji = fb.emojiRating || '😊';
            const receipt = fb.receiptNumber || fb.transactionId || 'N/A';
            let msg = rating >= 4 ? 'We are thrilled you had a great experience!' : rating === 3 ?
                'Thank you for your honest feedback.' : 'We apologize for your experience. We will do better.';
            return `<div class="min-h-[80vh] flex items-center justify-center p-4">
                <div class="glass max-w-md w-full p-8 text-center">
                    <div class="text-6xl mb-4 text-green-400"><i class="fas fa-check-circle"></i></div>
                    <h3 class="text-2xl font-bold text-green-400">Thank You!</h3>
                    <p class="text-gray-300 mt-2">${msg}</p>
                    <div class="glass-light p-4 mt-4 text-left">
                        <div class="flex justify-between border-b border-[#30363d] pb-2"><span class="text-gray-400">Rating</span><span class="text-yellow-400">${rating}★ ${emoji}</span></div>
                        <div class="flex justify-between border-b border-[#30363d] py-2"><span class="text-gray-400">Receipt</span><span class="text-cyan-400">${receipt}</span></div>
                        <div class="flex justify-between pt-2"><span class="text-gray-400">Submitted</span><span>${new Date().toLocaleString()}</span></div>
                        ${fb.comment?`<div class="mt-2 text-sm text-gray-300 border-t border-[#30363d] pt-2">"${fb.comment}"</div>`:''}
                    </div>
                    <div class="mt-6 flex gap-3 justify-center"><button onclick="navigateFeedback()" class="btn-primary px-6 py-2">Back</button><button onclick="navigate('pos')" class="btn-secondary px-6 py-2">Home</button></div>
                </div>
            </div>`;
        }

        function checkFeedbackURL() {
            const params = new URLSearchParams(window.location.search);
            const fb = params.get('feedback');
            const receipt = params.get('receipt');
            if (fb !== null || receipt) {
                if (appData.currentUser && hasRole(['Owner', 'Manager']) && !receipt) {
                    currentView = 'admin';
                    currentAdminPanel = 'feedback';
                    renderApp();
                    return true;
                }
                const main = document.getElementById("mainContent");
                if (main) { main.innerHTML = renderFeedbackForm(receipt || ''); }
                return true;
            }
            return false;
        }

        // ─── REPORTS ──────────────────────────────────────────────────
        function renderReportSummaries() {
            if (showLogin) return renderLogin();
            if (!hasRole(['Owner', 'Manager'])) {
                return `<div class="glass p-8 text-center"><i class="fas fa-lock text-4xl text-red-400 mb-4"></i><p class="text-xl">Access Denied.</p></div>`;
            }
            const totalSales = appData.transactions.reduce((s, t) => s + t.total, 0);
            const totalExp = appData.expenses.reduce((s, e) => s + e.amount, 0);
            const totalComm = appData.staff.reduce((sum, s) => sum + (s.totalCommission || 0), 0);
            const totalCredit = (appData.credits || []).reduce((sum, c) => sum + (c.balance || 0), 0);

            return `<div class="card-premium p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-chart-bar"></i> Report Summaries</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="quick-stat"><div class="icon text-green-400"><i class="fas fa-coins"></i></div><div class="value text-green-400">₱${totalSales.toFixed(2)}</div><div class="stat-label">Total Sales</div></div>
                    <div class="quick-stat"><div class="icon text-red-400"><i class="fas fa-money-bill-wave"></i></div><div class="value text-red-400">₱${totalExp.toFixed(2)}</div><div class="stat-label">Total Expenses</div></div>
                    <div class="quick-stat"><div class="icon text-yellow-400"><i class="fas fa-percent"></i></div><div class="value text-yellow-400">₱${totalComm.toFixed(2)}</div><div class="stat-label">Total Commission</div></div>
                    <div class="quick-stat"><div class="icon text-cyan-400"><i class="fas fa-hand-holding-usd"></i></div><div class="value text-cyan-400">₱${(totalSales-totalExp).toFixed(2)}</div><div class="stat-label">Net Profit</div></div>
                    <div class="quick-stat"><div class="icon text-orange-400"><i class="fas fa-credit-card"></i></div><div class="value text-orange-400">₱${totalCredit.toFixed(2)}</div><div class="stat-label">Credit Outstanding</div></div>
                    <div class="quick-stat"><div class="icon text-purple-400"><i class="fas fa-comment-dots"></i></div><div class="value text-purple-400">${getAllFeedback().length}</div><div class="stat-label">Feedback</div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-[#161b22] p-4 rounded-lg"><h4 class="font-bold text-cyan-400 mb-2">📊 Weekly Commission</h4><button onclick="navigateAdmin('weeklycommission')" class="btn-primary text-sm">View Full Report</button></div>
                    <div class="bg-[#161b22] p-4 rounded-lg"><h4 class="font-bold text-cyan-400 mb-2">📋 Transaction Tracking</h4><button onclick="navigateAdmin('transactiontracking')" class="btn-primary text-sm">View Transactions</button></div>
                    <div class="bg-[#161b22] p-4 rounded-lg"><h4 class="font-bold text-cyan-400 mb-2">💬 Feedback</h4><button onclick="navigateAdmin('feedback')" class="btn-primary text-sm">View Feedback</button></div>
                    <div class="bg-[#161b22] p-4 rounded-lg"><h4 class="font-bold text-cyan-400 mb-2">📈 Daily Sales</h4><button onclick="navigateAdmin('dailytransactions')" class="btn-primary text-sm">View Daily</button></div>
                </div>
            </div>`;
        }

        function renderCommissionReports() {
            if (showLogin) return renderLogin();
            recalcAllCommissions();
            return `<div class="card-premium p-6">${renderWeeklyCommissionReport()}</div>`;
        }

        // ─── MAIN RENDER ─────────────────────────────────────────────
        function renderApp() {
            if (showLogin) { document.getElementById("mainContent").innerHTML = renderLogin(); return; }
            if (appData.currentUser?.role === 'Staff') currentView = 'staff_dashboard';

            const main = document.getElementById("mainContent");
            if (!main) return;

            // Check URL feedback
            const params = new URLSearchParams(window.location.search);
            const fbParam = params.get('feedback');
            const receiptParam = params.get('receipt');
            if ((fbParam !== null || receiptParam) && !(appData.currentUser && hasRole(['Owner', 'Manager']) && !
                    receiptParam)) {
                main.innerHTML = renderFeedbackForm(receiptParam || '');
                return;
            }

            let content = '';
            if (currentView === "staff_dashboard") content = renderStaffDashboard();
            else if (currentView === "dashboard") content = renderDashboard();
            else if (currentView === "pos") content = renderPOS();
            else if (currentView === "openservices") content = renderOpenServices();
            else if (currentView === "customers") content = renderCustomers();
            else if (currentView === "staff") content = renderStaffDashboard();
            else if (currentView === "admin") {
                if (!hasRole(['Owner', 'Manager'])) content =
                    `<div class="glass p-8 text-center"><i class="fas fa-lock text-4xl text-red-400 mb-4"></i><p class="text-xl">Access Denied.</p></div>`;
                else content = renderAdminDashboard();
            } else if (currentView === "reports") content = renderReportSummaries();
            else if (currentView === "commission") content = renderCommissionReports();
            else content = renderDashboard();
            main.innerHTML = content;
            setTimeout(() => {
                document.getElementById('plateInput')?.addEventListener('input', (e) => vehicleInfo.plate = e
                    .target.value);
                document.getElementById('modelInput')?.addEventListener('input', (e) => vehicleInfo.model = e
                    .target.value);
                handlePaymentChange();
            }, 50);
            updateClock();
            saveToLocal();
        }

        // ─── LIVE CLOCK ──────────────────────────────────────────────
        function updateClock() {
            const el = document.getElementById('liveClock');
            if (el) el.textContent = new Date().toLocaleString();
        }
        setInterval(updateClock, 1000);

        // ─── INACTIVITY ──────────────────────────────────────────────
        let inactivityTimer = null;

        function resetInactivity() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            const timeout = (appData.systemSettings.inactivityTimeout || 30) * 60 * 1000;
            inactivityTimer = setTimeout(() => {
                if (!showLogin && appData.currentUser) {
                    addActivityLog('Auto-Logout', `User ${appData.currentUser.name} auto-logged out`);
                    addAuditTrail('Auto-Logout', `User ${appData.currentUser.name} auto-logged out`, appData
                        .currentUser.id, 'user');
                    alert("Logged out due to inactivity.");
                    logout();
                }
            }, timeout);
        }
        ['click', 'keypress', 'mousemove', 'touchstart'].forEach(ev => document.addEventListener(ev, resetInactivity));

        // ─── INIT ─────────────────────────────────────────────────────
        loadLocalData();
        initFirebase().then((ok) => {
            if (!ok) {
                addFirebaseLog('ℹ️ Offline mode — using local cache.', 'warn');
                updateFirebaseStatus('offline', 'Local Cache');
            }
            recalculateAllTransactionReports();
            recalcAllCommissions();
            renderApp();
            resetInactivity();
            checkFeedbackURL();
        });

        // ─── BUILD UI ────────────────────────────────────────────────
        const isStaff = appData.currentUser?.role === 'Staff';
        const navItems = isStaff ? `
            <button class="nav-btn active" onclick="navigate('staff_dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
        ` : `
            <button class="nav-btn ${currentView==='pos'?'active':''}" onclick="navigate('pos')"><i class="fas fa-cash-register"></i> POS</button>
            <button class="nav-btn ${currentView==='dashboard'?'active':''}" onclick="navigate('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button class="nav-btn ${currentView==='openservices'?'active':''}" onclick="navigate('openservices')"><i class="fas fa-clipboard-list"></i> Open</button>
            <button class="nav-btn ${currentView==='staff'?'active':''}" onclick="navigate('staff')"><i class="fas fa-id-badge"></i> Staff</button>
            <button class="nav-btn ${currentView==='customers'?'active':''}" onclick="navigate('customers')"><i class="fas fa-users"></i> Customers</button>
            <button class="nav-btn ${currentView==='admin'?'active':''}" onclick="navigate('admin')"><i class="fas fa-crown"></i> Admin</button>
            <button class="nav-btn ${currentView==='reports'?'active':''}" onclick="navigate('reports')"><i class="fas fa-chart-bar"></i> Reports</button>
            <button class="nav-btn ${currentView==='commission'?'active':''}" onclick="navigate('commission')"><i class="fas fa-percent"></i> Commissions</button>
            <button class="nav-btn" onclick="window.location.href='?feedback'" style="color:#a78bfa;border-color:#a78bfa33;"><i class="fas fa-comment-dots"></i> Feedback</button>
        `;

        const root = document.getElementById("root");
        root.innerHTML = `
            <div class="max-w-screen-2xl mx-auto px-4 py-3">
                <header class="main-header flex items-center justify-between flex-wrap gap-2 bg-[#0d1117] border-b border-[#30363d] p-3">
                    <div class="logo-container flex items-center gap-3">
                        <div class="logo-icon w-12 h-12 rounded-lg overflow-hidden bg-[#0d1117] border border-[#30363d] flex items-center justify-center" id="headerLogoContainer">
                            ${appData.systemSettings.companyLogo ? `<img src="${appData.systemSettings.companyLogo}" class="w-full h-full object-contain">` : `<div class="text-cyan-400 font-bold text-lg border border-cyan-400/20 rounded-lg bg-[#0d1117] px-3 py-1">CS</div>`}
                        </div>
                        <div class="brand-text"><span class="company-title text-lg font-bold text-white">8068 CAR SQUARE</span><span class="company-subtitle text-cyan-400 text-xs">One Stop Shop <span class="company-version text-gray-500 text-[10px]">| v8.8.5</span></span></div>
                    </div>
                    <div class="header-nav flex gap-1 flex-wrap" id="desktopNav">${navItems}</div>
                    <div class="header-user flex items-center gap-2 text-sm">
                        <span class="user-name text-gray-400"><i class="fas fa-user-circle"></i> ${appData.currentUser?.name||'Guest'} (${appData.currentUser?.role||'N/A'})</span>
                        <span class="logout-btn text-red-400 cursor-pointer hover:text-red-300" onclick="logout()"><i class="fas fa-sign-out-alt"></i></span>
                        <span id="syncStatus" class="sync-status text-xs"><i class="fas fa-cloud"></i> ${firebaseInitialized&&isFirebasePrimary?'Online':'Offline'}</span>
                        <button class="mobile-nav-toggle text-cyan-400 text-xl" onclick="toggleMobileNav()"><i class="fas fa-bars"></i></button>
                    </div>
                </header>
                <div class="mobile-nav" id="mobileNav">${navItems}</div>
                <div id="mainContent" class="mt-2"></div>
                <footer class="text-center text-gray-500 text-xs mt-8 pt-4 border-t border-[#30363d]">${appData.systemSettings.companyName} | v8.8.5 | QR Feedback | ${firebaseInitialized&&isFirebasePrimary?'🌐 Online':'📡 Offline'}</footer>
            </div>
        `;

        renderApp();
        saveToLocal();

        console.log('%c8068 CAR SQUARE v8.8.5 · QR Code Feedback Edition', 'color:#58a6ff;font-size:20px;font-weight:bold;');
        console.log(`%cTX: ${appData.transactions.length} | Customers: ${appData.customers.length} | Staff: ${appData.staff.length} | Feedback: ${getAllFeedback().length}`, 'color:#3fb950;');
        console.log('%c✅ All exports & print functions restored', 'color:#3fb950;');
        console.log('%c💬 QR Code Feedback — scan to rate', 'color:#a78bfa;');
        console.log('%c📊 Sunday-Saturday weekly commission cycle', 'color:#58a6ff;');
        if (!firebaseInitialized || !isFirebasePrimary) console.log('%c⚠️ Configure Firebase in Admin → System Settings', 'color:#d29922;');
        else console.log('%c✅ Firebase connected — real-time sync ON', 'color:#3fb950;');
    </script>
</body>
</html>
