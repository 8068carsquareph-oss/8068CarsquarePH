<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>8068 CAR SQUARE · POS v8.8.5</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>
    <style>
        /* ── Reset & base ── */
        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        body {
            background: #0d1117;
            color: #e6edf3;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #161b22;
        }
        ::-webkit-scrollbar-thumb {
            background: #58a6ff;
            border-radius: 10px;
        }

        /* ── Glass / cards ── */
        .glass {
            background: rgba(22, 27, 34, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(88, 166, 255, 0.15);
            border-radius: 16px;
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
        }
        .card-premium {
            background: rgba(22, 27, 34, 0.92);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(88, 166, 255, 0.18);
            border-radius: 16px;
            transition: border-color 0.25s;
        }
        .card-premium:hover {
            border-color: rgba(88, 166, 255, 0.35);
        }

        /* ── Neon / accent ── */
        .accent {
            color: #58a6ff;
        }
        .accent-bg {
            background: linear-gradient(135deg, #1f6feb, #1a5fd0);
        }
        .accent-glow {
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1f6feb, #1a5fd0);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 24px rgba(88, 166, 255, 0.35);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 500;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
        }

        /* ── Status badges ── */
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-pending {
            background: rgba(210, 153, 34, 0.20);
            color: #d29922;
        }
        .badge-progress {
            background: rgba(88, 166, 255, 0.20);
            color: #58a6ff;
        }
        .badge-done {
            background: rgba(46, 160, 67, 0.20);
            color: #3fb950;
        }
        .badge-paid {
            background: rgba(139, 148, 158, 0.25);
            color: #8b949e;
        }
        .badge-credit {
            background: rgba(219, 109, 40, 0.20);
            color: #db6d28;
        }

        /* ── Tables ── */
        .table-wrap {
            max-height: 520px;
            overflow-y: auto;
            position: relative;
        }
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .table-wrap thead {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #0d1117;
        }
        .table-wrap th {
            background: #0d1117;
            border-bottom: 2px solid #58a6ff;
            padding: 10px 8px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #58a6ff;
            text-align: left;
        }
        .table-wrap td {
            padding: 8px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }
        .table-wrap tr:hover {
            background: rgba(88, 166, 255, 0.03);
        }

        /* ── Misc ── */
        .service-btn {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: #e6edf3;
            text-align: left;
        }
        .service-btn:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
            background: #1c2333;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .editable-field {
            cursor: pointer;
            transition: all 0.15s;
            padding: 2px 6px;
            border-radius: 6px;
        }
        .editable-field:hover {
            background: rgba(88, 166, 255, 0.10);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-box {
            background: #161b22;
            border-radius: 20px;
            padding: 24px;
            max-width: 780px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(88, 166, 255, 0.20);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        .receipt-58mm {
            width: 58mm;
            margin: 0 auto;
            padding: 8px;
            background: #fff;
            color: #000;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }
        .receipt-80mm {
            width: 80mm;
            margin: 0 auto;
            padding: 12px;
            background: #fff;
            color: #000;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .receipt-58mm .center,
        .receipt-80mm .center {
            text-align: center;
        }
        .receipt-58mm .line,
        .receipt-80mm .line {
            border-top: 1px dashed #000;
            margin: 4px 0;
        }
        .receipt-58mm .bold,
        .receipt-80mm .bold {
            font-weight: bold;
        }
        .receipt-58mm .total,
        .receipt-80mm .total {
            font-size: 16px;
            font-weight: bold;
        }
        .receipt-58mm .item .name,
        .receipt-80mm .item .name {
            display: inline-block;
            width: 70%;
        }
        .receipt-58mm .item .price,
        .receipt-80mm .item .price {
            display: inline-block;
            width: 30%;
            text-align: right;
        }

        /* ── Admin sidebar ── */
        .admin-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 20px;
        }
        .admin-sidebar {
            background: rgba(13, 17, 23, 0.95);
            border-right: 1px solid rgba(88, 166, 255, 0.15);
            border-radius: 16px 0 0 16px;
            padding: 18px 12px;
        }
        .admin-sidebar-item {
            padding: 10px 14px;
            margin: 3px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 13px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-sidebar-item:hover {
            background: rgba(88, 166, 255, 0.08);
            color: #e6edf3;
        }
        .admin-sidebar-item.active {
            background: rgba(88, 166, 255, 0.14);
            color: #58a6ff;
            border-left: 3px solid #58a6ff;
        }
        .admin-content {
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
            .admin-sidebar {
                border-radius: 16px;
                border-right: none;
                border-bottom: 1px solid rgba(88, 166, 255, 0.10);
            }
            .modal-box {
                padding: 16px;
                margin: 12px;
            }
            .table-wrap {
                font-size: 11px;
                overflow-x: auto;
            }
            .table-wrap table {
                min-width: 760px;
            }
            .table-wrap th,
            .table-wrap td {
                padding: 4px 3px;
                font-size: 10px;
            }
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: #fff !important;
                color: #000 !important;
            }
            .card-premium {
                border: 1px solid #ddd !important;
                background: #fff !important;
            }
            .table-wrap {
                max-height: none !important;
                overflow: visible !important;
            }
            .table-wrap thead {
                position: static !important;
            }
            .admin-sidebar {
                display: none !important;
            }
            .admin-grid {
                display: block !important;
            }
            .receipt-58mm,
            .receipt-80mm {
                margin: 0 !important;
            }
        }

        /* ── Animations ── */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-in {
            animation: fadeSlideUp 0.35s ease-out both;
        }

        @keyframes pulse-sync {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .sync-pulse {
            animation: pulse-sync 1.2s ease-in-out infinite;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .quick-stat {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid rgba(88, 166, 255, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            transition: all 0.2s;
            text-align: center;
        }
        .quick-stat:hover {
            border-color: rgba(88, 166, 255, 0.25);
            transform: translateY(-2px);
        }
        .quick-stat .icon {
            font-size: 22px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .quick-stat .value {
            font-size: 22px;
            font-weight: 700;
        }

        .size-option {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .size-option:hover {
            border-color: #58a6ff;
            background: #1c2333;
        }
        .size-option.selected {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.15);
            box-shadow: 0 0 16px rgba(88, 166, 255, 0.10);
        }

        .filter-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(88, 166, 255, 0.06);
            border-radius: 12px;
            padding: 10px 14px;
        }
        .filter-panel select,
        .filter-panel input {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 6px 12px;
            color: #e6edf3;
            font-size: 12px;
            min-width: 100px;
        }
        .filter-panel select:focus,
        .filter-panel input:focus {
            border-color: #58a6ff;
            outline: none;
        }
        .filter-panel label {
            font-size: 11px;
            color: #8b949e;
            margin-right: 2px;
        }

        .action-btn {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn:hover {
            transform: scale(1.04);
        }
        .action-btn-sm {
            padding: 2px 8px;
            font-size: 10px;
        }

        .pagination-btn {
            padding: 4px 14px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 13px;
        }
        .pagination-btn:hover {
            border-color: #58a6ff;
            background: #1c2333;
        }
        .pagination-btn.active {
            background: #58a6ff;
            border-color: #58a6ff;
            color: #0d1117;
            font-weight: 600;
        }
        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .status-badge {
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .status-pending {
            background: rgba(210, 153, 34, 0.18);
            color: #d29922;
        }
        .status-in-progress {
            background: rgba(88, 166, 255, 0.18);
            color: #58a6ff;
        }
        .status-completed {
            background: rgba(46, 160, 67, 0.18);
            color: #3fb950;
        }
        .status-paid {
            background: rgba(139, 148, 158, 0.18);
            color: #8b949e;
        }
        .status-credit {
            background: rgba(219, 109, 40, 0.18);
            color: #db6d28;
        }

        .qr-code-container {
            display: flex;
            justify-content: center;
            margin: 6px 0;
            padding: 4px;
            background: #fff;
            border-radius: 6px;
        }
        .qr-code-container canvas,
        .qr-code-container img {
            max-width: 100%;
            height: auto;
        }

        .commission-badge {
            background: rgba(88, 166, 255, 0.12);
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .credit-row {
            border-left: 3px solid #db6d28;
        }

        .chart-container {
            position: relative;
            height: 260px;
            width: 100%;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        .summary-item {
            background: rgba(13, 17, 23, 0.4);
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
            border: 1px solid rgba(88, 166, 255, 0.05);
        }
        .summary-item .s-label {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .summary-item .s-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 2px;
        }
        .s-value.green {
            color: #3fb950;
        }
        .s-value.cyan {
            color: #58a6ff;
        }
        .s-value.yellow {
            color: #d29922;
        }
        .s-value.purple {
            color: #bc8cff;
        }
        .s-value.red {
            color: #f85149;
        }
        .s-value.orange {
            color: #db6d28;
        }
        .s-value.pink {
            color: #f778ba;
        }

        .feedback-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .feedback-stat-card {
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(88, 166, 255, 0.06);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: all 0.2s;
        }
        .feedback-stat-card:hover {
            border-color: rgba(88, 166, 255, 0.15);
        }
        .feedback-stat-card .stat-number {
            font-size: 22px;
            font-weight: 700;
        }
        .feedback-stat-card .stat-label {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }
        .feedback-stat-card .stat-icon {
            font-size: 18px;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .rating-badge.good {
            background: rgba(46, 160, 67, 0.15);
            color: #3fb950;
        }
        .rating-badge.average {
            background: rgba(210, 153, 34, 0.15);
            color: #d29922;
        }
        .rating-badge.poor {
            background: rgba(248, 81, 73, 0.15);
            color: #f85149;
        }

        .emoji-rating .emoji-btn {
            transition: all 0.2s;
            filter: grayscale(0.6);
            opacity: 0.5;
            transform: scale(0.85);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: transparent;
            font-size: 32px;
        }
        .emoji-rating .emoji-btn:hover {
            transform: scale(1.10);
            filter: grayscale(0);
            opacity: 1;
        }
        .emoji-rating .emoji-btn.active {
            transform: scale(1.15);
            filter: grayscale(0);
            opacity: 1;
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.08);
        }

        .star-rating .star {
            font-size: 30px;
            color: #30363d;
            cursor: pointer;
            transition: color 0.15s;
        }
        .star-rating .star.active {
            color: #d29922;
        }
        .star-rating .star:hover {
            color: #d29922;
            transform: scale(1.05);
        }

        .receipt-dual {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .receipt-dual .receipt-half {
            border-bottom: 2px dashed #000;
            padding-bottom: 6px;
            margin-bottom: 6px;
        }
        .receipt-dual .receipt-half:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .receipt-customer .receipt-copy-label {
            color: #1f6feb;
        }
        .receipt-shop .receipt-copy-label {
            color: #db6d28;
        }

        .activity-item {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .activity-item .time {
            color: #8b949e;
            font-size: 11px;
            min-width: 60px;
        }
        .activity-item .text {
            color: #c9d1d9;
        }
        .activity-item .text strong {
            color: #e6edf3;
        }

        .log-console {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 10px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #3fb950;
        }
        .log-console .error {
            color: #f85149;
        }
        .log-console .warn {
            color: #d29922;
        }
        .log-console .info {
            color: #58a6ff;
        }
        .log-console .success {
            color: #3fb950;
        }

        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }
        .quick-action-btn {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 12px;
            color: #c9d1d9;
        }
        .quick-action-btn:hover {
            border-color: #58a6ff;
            background: #1c2333;
            transform: translateY(-2px);
        }
        .quick-action-btn i {
            font-size: 18px;
            display: block;
            margin-bottom: 4px;
            color: #58a6ff;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .pos-service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
        }
        .pos-service-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .pos-service-item:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
            background: #1c2333;
        }
        .pos-service-item .name {
            font-weight: 600;
            font-size: 14px;
        }
        .pos-service-item .desc {
            font-size: 11px;
            color: #8b949e;
            margin: 4px 0;

        function sanitizeDataForFirebase(data) {
            if (data === undefined || data === null) return null;
            if (typeof data !== 'object') return data;
            if (Array.isArray(data)) return data.map(sanitizeDataForFirebase);
            const cleaned = {};
            for (const k in data) {
                if (data[k] === undefined) cleaned[k] = null;
                else if (data[k] === null) cleaned[k] = null;
                else if (typeof data[k] === 'object') cleaned[k] = sanitizeDataForFirebase(data[k]);
                else cleaned[k] = data[k];
            }
            return cleaned;

        function initFirebase() {

                    const connRef = firebaseDb.ref('.info/connected');
                    let attempts = 0;
                    const maxAttempts = 3;
                    const check = () => {
                        connRef.once('value').then((snap) => {
                            if (snap.val() === true) {
                                if (!firebaseInitialized) {
                                    firebaseInitialized = true;
                                    isFirebasePrimary = true;
                                    isOnline = true;
                                    addFirebaseLog('✅ Firebase connected as PRIMARY', 'success');

                                        loadAllDataFromFirebase(); }
                                    resolve(true);

                                attempts++;
                                if (attempts < maxAttempts) {
                                    addFirebaseLog(`🔄 Attempt ${attempts}/${maxAttempts}...`, 'warn');
                                    setTimeout(check, 2000);
                                } else {
                                    addFirebaseLog('⚠️ Using local cache only.', 'warn');
                                    isFirebasePrimary = false;
                                    isOnline = false;
                                    updateFirebaseStatus('offline', 'Local Cache');
                                    loadLocalData();
                                    resolve(false);
                                }
                            }
                        }).catch((err) => {
                            attempts++;
                            if (attempts < maxAttempts) {
                                addFirebaseLog(`🔄 Retry ${attempts}: ${err.message}`, 'warn');
                                setTimeout(check, 2000);
                            } else {
                                addFirebaseLog(`❌ Firebase failed: ${err.message}`, 'error');

                                isOnline = false;
                                updateFirebaseStatus('error', 'Connection Failed');
                                loadLocalData();
                                resolve(false);
                            }

                                isOnline = false;
                                updateFirebaseStatus('offline', 'Local Cache');

                            }
                        }

                    check();

                isOnline = false;
                updateFirebaseStatus('error', 'Init Failed');
                loadLocalData();
                return Promise.resolve(false);

        function syncToFirebase(force = false) {
            if (!firebaseDb) return Promise.reject('Firebase not ready');
            if (firebaseIsSyncing && !force) return Promise.resolve('Already syncing');
            if (!isOnline) {
                addFirebaseLog('⏳ Offline — queued', 'warn');
                pendingSyncQueue.push({ timestamp: new Date().toISOString() });
                return Promise.resolve('Queued');
            }
            firebaseIsSyncing = true;
            updateFirebaseStatus('syncing', 'Syncing...');
            addFirebaseLog('🔄 Syncing...', 'info');

            const raw = {
                services: appData.services || [],
                categories: appData.categories || [],
                customers: appData.customers || [],
                transactions: appData.transactions || [],
                openServices: appData.openServices || [],
                staff: appData.staff || [],
                expenses: appData.expenses || [],
                credits: appData.credits || [],
                inventory: appData.inventory || [],
                systemSettings: appData.systemSettings || {},
                users: appData.users || [],
                currentUser: appData.currentUser || null,
                nextIds: appData.nextIds || {},
                commissionMatrix: appData.commissionMatrix || {},
                reports: appData.reports || { weekly: [], monthly: [], yearly: [] },
                commissionReports: appData.commissionReports || { weekly: [], monthly: [], yearly: [] },
                commissionWeekly: appData.commissionWeekly || { current: null, archives: [] },
                transactionReports: appData.transactionReports || { daily: {}, weekly: {}, monthly: {},
                yearly: {} },
                auditTrail: appData.auditTrail || [],
                feedback: appData.feedback || [],
                lastUpdated: new Date().toISOString(),
                version: '8.8.5'
            };
            const data = sanitizeDataForFirebase(raw);
            return firebaseDb.ref('8068_pos_system_v8').set(data).then(() => {
                firebaseIsSyncing = false;
                firebaseTotalSynced++;
                isOnline = true;
                localStorage.setItem('8068_last_sync_v8', new Date().toISOString());
                addFirebaseLog('✅ Sync complete!', 'success');
                updateFirebaseStatus('online', 'Primary');
                if (pendingSyncQueue.length) pendingSyncQueue = [];
                return true;
            }).catch((err) => {
                firebaseIsSyncing = false;
                isOnline = false;
                addFirebaseLog(`❌ Sync error: ${err.message}`, 'error');
                updateFirebaseStatus('error', 'Sync Failed');
                pendingSyncQueue.push({ timestamp: new Date().toISOString() });
                return false;
            });
        }

        function debouncedSync() {
            if (syncTimer) clearTimeout(syncTimer);
            syncTimer = setTimeout(() => {
                syncTimer = null;
                if (firebaseInitialized && isFirebasePrimary && !firebaseIsSyncing) syncToFirebase();
                else if (!isOnline) initFirebase().then(() => { if (isOnline) syncToFirebase(); });
            }, 1500);
        }

        function setupRealtimeListener() {
            if (!firebaseInitialized || !firebaseDb) return;
            firebaseListeners.forEach(ref => { try { ref.off(); } catch (_) {} });
            firebaseListeners = [];
            addFirebaseLog('🔌 Realtime listener active', 'info');
            const ref = firebaseDb.ref('8068_pos_system_v8');
            ref.on('value', (snap) => {
                const data = snap.val();
                if (data && !firebaseIsSyncing && isFirebasePrimary && isOnline) {
                    addFirebaseLog('🔄 Real-time update', 'info');
                    let changed = false;
                    const skip = ['lastUpdated', 'version', '_test_connection'];
                    Object.keys(data).forEach(k => {
                        if (skip.includes(k)) return;
                        if (appData[k] !== undefined && data[k] !== null) {
                            const local = JSON.stringify(appData[k]);
                            const remote = JSON.stringify(data[k]);
                            if (local !== remote) { appData[k] = data[k];
                                changed = true; }
                        }
                    });
                    if (changed) { saveToLocal();
                        addFirebaseLog('✅ Data updated via real-time', 'success');
                        updateFirebaseStatus('online', 'Primary');
                        renderApp(); }
                }
            }, (err) => {
                addFirebaseLog(`⚠️ Listener error: ${err.message}`, 'warn');
                isOnline = false;
                updateFirebaseStatus('offline', 'Listener Lost');
            });
            firebaseListeners.push(ref);
        }

        // ─── HELPERS ──────────────────────────────────────────────────
        function getWeekStart(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() - d.getDay());
            return d;
        }

        function getWeekEnd(date) {
            const d = getWeekStart(date);
            d.setDate(d.getDate() + 6);
            d.setHours(23, 59, 59, 999);
            return d;
        }

        function getWeekLabel(date) {
            const s = getWeekStart(date),
                e = getWeekEnd(date);
            const opts = { month: 'long', day: 'numeric', year: 'numeric' };
            return `Sunday, ${s.toLocaleDateString('en-US', opts)} – Saturday, ${e.toLocaleDateString('en-US', opts)}`;
        }

        function getWeekId(date) {
            const s = getWeekStart(date);
            const y = s.getFullYear();
            const jan1 = new Date(y, 0, 1);
            const days = Math.floor((s - jan1) / 86400000);
            const wn = Math.ceil((days + 1) / 7);
            return `${y}-W${String(wn).padStart(2, '0')}`;
        }

        function getCurrentWeekId() { return getWeekId(new Date()); }

        function getCommissionAmount(serviceName, size, tierPercent) {
            const key = serviceName + '_' + size;
            const vals = appData.commissionMatrix[key] || [0, 0, 0];
            if (tierPercent === 30) return vals[0];
            if (tierPercent === 35) return vals[1];
            if (tierPercent === 40) return vals[2];
            return 0;
        }

        function computeTransactionSummary(txns) {
            if (!txns || !txns.length) return {
                totalTransactions: 0,
                grossSales: 0,
                cashPayments: 0,
                gcashPayments: 0,
                creditTransactions: 0,
                totalDiscount: 0,
                totalCommission: 0,
                averageValue: 0,
                highestAmount: 0,
                lowestAmount: 0
            };
            const total = txns.length;
            const gross = txns.reduce((s, t) => s + (t.total || 0), 0);
            const cash = txns.filter(t => t.paymentMethod === 'Cash').reduce((s, t) => s + (t.total || 0), 0);
            const gcash = txns.filter(t => t.paymentMethod === 'GCash').reduce((s, t) => s + (t.total || 0), 0);
            const credit = txns.filter(t => t.paymentMethod === 'Credit (Utang)' || t.isCredit).length;
            const disc = txns.reduce((s, t) => s + (t.discount || 0), 0);
            let comm = 0;
            txns.forEach(t => {
                if (t.staffCommissions) {
                    comm += Object.values(t.staffCommissions).reduce((sum, st) => sum + (st.commission || 0),
                    0);
                }
            });
            const amts = txns.map(t => t.total || 0).filter(a => a > 0);
            const avg = total ? gross / total : 0;
            const high = amts.length ? Math.max(...amts) : 0;
            const low = amts.length ? Math.min(...amts) : 0;
            return {
                totalTransactions: total,
                grossSales: gross,
                cashPayments: cash,
                gcashPayments: gcash,
                creditTransactions: credit,
                totalDiscount: disc,
                totalCommission: comm,
                averageValue: avg,
                highestAmount: high,
                lowestAmount: low
            };
        }

        function updateTransactionReports(tx) {
            if (!tx) return;
            if (!appData.transactionReports) appData.transactionReports = { daily: {}, weekly: {}, monthly: {},
                yearly: {} };
            const d = new Date(tx.date);
            const dateKey = d.toISOString().slice(0, 10);
            const monthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            const yearKey = `${d.getFullYear()}`;
            const weekId = getWeekId(d);
            const weekStartStr = getWeekStart(d).toISOString().slice(0, 10);

            if (!appData.transactionReports.daily[dateKey]) {
                appData.transactionReports.daily[dateKey] = { transactions: [], summary: {} };
            }
            const daily = appData.transactionReports.daily[dateKey];
            if (!daily.transactions.find(t => t.id === tx.id)) { daily.transactions.push(tx);
                daily.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)); }
            daily.summary = computeTransactionSummary(daily.transactions);

            if (!appData.transactionReports.weekly[weekId]) {
                appData.transactionReports.weekly[weekId] = {
                    weekStart: weekStartStr,
                    weekEnd: getWeekEnd(d).toISOString().slice(0, 10),
                    weekLabel: getWeekLabel(d),
                    transactions: [],
                    summary: {}
                };
            }
            const wk = appData.transactionReports.weekly[weekId];
            if (!wk.transactions.find(t => t.id === tx.id)) { wk.transactions.push(tx);
                wk.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)); }
            wk.summary = computeTransactionSummary(wk.transactions);

            if (!appData.transactionReports.monthly[monthKey]) {
                appData.transactionReports.monthly[monthKey] = {
                    month: monthKey,
                    year: d.getFullYear(),
                    monthName: d.toLocaleString('default', { month: 'long' }),
                    transactions: [],
                    summary: {}
                };
            }
            const mo = appData.transactionReports.monthly[monthKey];
            if (!mo.transactions.find(t => t.id === tx.id)) { mo.transactions.push(tx);
                mo.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)); }
            mo.summary = computeTransactionSummary(mo.transactions);

            if (!appData.transactionReports.yearly[yearKey]) {
                appData.transactionReports.yearly[yearKey] = { year: yearKey, transactions: [], summary: {} };
            }
            const yr = appData.transactionReports.yearly[yearKey];
            if (!yr.transactions.find(t => t.id === tx.id)) { yr.transactions.push(tx);
                yr.transactions.sort((a, b) => new Date(b.date) - new Date(a.date)); }
            yr.summary = computeTransactionSummary(yr.transactions);
            saveToLocal();
        }

        function recalculateAllTransactionReports() {
            appData.transactionReports = { daily: {}, weekly: {}, monthly: {}, yearly: {} };
            appData.transactions.forEach(tx => updateTransactionReports(tx));
            saveToLocal();
        }

        // ─── FEEDBACK ─────────────────────────────────────────────────
        function getAllFeedback() { return appData.feedback || []; }

        function getFeedbackStats() {
            const all = getAllFeedback();
            if (!all.length) return { total: 0, average: 0, fiveStar: 0, fourStar: 0, threeStar: 0, twoStar: 0,
                oneStar: 0, positive: 0, negative: 0, neutral: 0, pending: 0, today: 0, thisWeek: 0, thisMonth: 0,
                thisYear: 0 };
            const now = new Date();
            const todayStr = now.toISOString().slice(0, 10);
            const ws = getWeekStart(now);
            const wsStr = ws.toISOString().slice(0, 10);
            const monthStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            const yearStr = String(now.getFullYear());
            const total = all.length;
            const ratings = all.map(f => f.rating || 0);
            const avg = total ? ratings.reduce((s, r) => s + r, 0) / total : 0;
            const five = all.filter(f => f.rating === 5).length;
            const four = all.filter(f => f.rating === 4).length;
            const three = all.filter(f => f.rating === 3).length;
            const two = all.filter(f => f.rating === 2).length;
            const one = all.filter(f => f.rating === 1).length;
            const pos = all.filter(f => f.rating >= 4).length;
            const neg = all.filter(f => f.rating <= 2).length;
            const neu = all.filter(f => f.rating === 3).length;
            const pending = all.filter(f => f.status === 'new').length;
            const today = all.filter(f => f.submissionDate && f.submissionDate.startsWith(todayStr)).length;
            const thisWeek = all.filter(f => f.submissionDate && f.submissionDate >= wsStr).length;
            const thisMonth = all.filter(f => f.submissionDate && f.submissionDate.startsWith(monthStr)).length;
            const thisYear = all.filter(f => f.submissionDate && f.submissionDate.startsWith(yearStr)).length;
            return { total, average: avg, fiveStar: five, fourStar: four, threeStar: three, twoStar: two, oneStar: one,
                positive: pos, negative: neg, neutral: neu, pending, today, thisWeek, thisMonth, thisYear };
        }

        function getFeedbackByDateRange(start, end) {
            const all = getAllFeedback();
            if (!start && !end) return all;
            return all.filter(f => {
                const d = f.submissionDate ? f.submissionDate.slice(0, 10) : '';
                if (start && end) return d >= start && d <= end;
                if (start) return d >= start;
                if (end) return d <= end;
                return true;
            });
        }

        function getFeedbackReport(period) {
            const now = new Date();
            let start = '',
                end = now.toISOString().slice(0, 10);
            if (period === 'daily') start = end;
            else if (period === 'weekly') { const ws = getWeekStart(now);
                start = ws.toISOString().slice(0, 10); } else if (period === 'monthly') start = now.getFullYear() +
                '-' + String(now.getMonth() + 1).padStart(2, '0') + '-01';
            else if (period === 'yearly') start = now.getFullYear() + '-01-01';
            const fb = getFeedbackByDateRange(start, end);
            const stats = {
                total: fb.length,
                averageRating: fb.length ? fb.reduce((s, f) => s + (f.rating || 0), 0) / fb.length : 0,
                positive: fb.filter(f => (f.rating || 0) >= 4).length,
                negative: fb.filter(f => (f.rating || 0) <= 2).length,
                neutral: fb.filter(f => (f.rating || 0) === 3).length,
                comments: fb.filter(f => f.comment && f.comment.trim().length > 0).map(f => f.comment)
            };
            const staffMap = {};
            fb.forEach(f => {
                if (f.assignedStaff && f.assignedStaff !== 'N/A') {
                    f.assignedStaff.split(',').map(s => s.trim()).filter(Boolean).forEach(name => {
                        if (!staffMap[name]) staffMap[name] = { count: 0, ratings: [] };
                        staffMap[name].count++;
                        staffMap[name].ratings.push(f.rating || 0);
                    });
                }
            });
            let mostStaff = 'N/A',
                mostStaffCount = 0;
            Object.keys(staffMap).forEach(name => {
                if (staffMap[name].count > mostStaffCount) { mostStaffCount = staffMap[name].count;
                    mostStaff = name; }
            });
            const svcMap = {};
            fb.forEach(f => {
                if (f.serviceAvailed && f.serviceAvailed !== 'N/A') {
                    f.serviceAvailed.split(',').map(s => s.trim()).filter(Boolean).forEach(svc => {
                        svcMap[svc] = (svcMap[svc] || 0) + 1;
                    });
                }
            });
            let mostSvc = 'N/A',
                mostSvcCount = 0;
            Object.keys(svcMap).forEach(name => {
                if (svcMap[name] > mostSvcCount) { mostSvcCount = svcMap[name];
                    mostSvc = name; }
            });
            return {
                period,
                startDate: start,
                endDate: end,
                stats,
                feedbacks: fb,
                mostRatedStaff: mostStaff,
                mostRatedStaffCount: mostStaffCount,
                mostRatedService: mostSvc,
                mostRatedServiceCount: mostSvcCount,
                summary: fb.map(f => ({
                    receipt: f.receiptNumber || f.transactionId,
                    date: f.submissionDate,
                    customer: f.customerName,
                    rating: f.rating,
                    emoji: f.emojiRating,
                    comment: f.comment || '—'
                }))
            };
        }

        function submitFeedback(txId, customerName, contactNumber, rating, emojiRating, comment, agree) {
            if (!appData.feedback) appData.feedback = [];
            if (appData.feedback.find(f => f.transactionId === txId || f.receiptNumber === txId)) {
                return { success: false, message: 'Feedback already submitted for this transaction.' };
            }
            const tx = appData.transactions.find(t => t.id === txId);
            if (!tx) return { success: false, message: 'Transaction not found.' };
            const entry = {
                id: 'FB-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                receiptNumber: txId,
                transactionId: txId,
                customerName: customerName || 'Anonymous',
                contactNumber: contactNumber || '',
                vehicleModel: tx.vehicle || 'N/A',
                plateNumber: tx.plate || 'N/A',
                vehicleSize: tx.items && tx.items.length ? tx.items[0].variant || 'N/A' : 'N/A',
                serviceAvailed: tx.items ? tx.items.map(i => i.serviceName).join(', ') : 'N/A',
                assignedStaff: tx.items ? [...new Set(tx.items.flatMap(i => i.assignedStaff ? i.assignedStaff.map(s =>
                    s.name) : []))].join(', ') : 'N/A',
                totalAmount: tx.total || 0,
                paymentMethod: tx.paymentMethod || 'N/A',
                rating: rating || 0,
                emojiRating: emojiRating || '',
                comment: comment || '',
                agreeToTerms: agree || false,
                submissionDate: new Date().toISOString(),
                status: 'new',
                deviceType: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
                browser: navigator.userAgent || 'Unknown',
                createdAt: Date.now(),
                _timestamp: Date.now()
            };
            appData.feedback.unshift(entry);
            if (appData.feedback.length > 500) appData.feedback = appData.feedback.slice(0, 500);
            saveToLocal();
            addActivityLog('Feedback Submitted', `${txId} - ${customerName || 'Anonymous'} - ${rating}★`);
            addAuditTrail('Feedback Submitted', `${txId} - ${customerName || 'Anonymous'} - ${rating}★`, entry.id,
                'feedback');
            return { success: true, feedback: entry };
        }

        // ─── EXPORT HELPERS ──────────────────────────────────────────
        function generateExcel(data, columns, title, filename) {
            const wsData = [
                [title],
                [`Generated: ${new Date().toLocaleString()}`],
                [`${appData.systemSettings.companyName}`],
                []
            ];
            wsData.push(columns.map(c => c.header));
            data.forEach(row => {
                wsData.push(columns.map(c => row[c.key] !== undefined ? row[c.key] : ''));
            });
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!cols'] = columns.map(() => ({ wch: 18 }));
            XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
            XLSX.writeFile(wb, `${filename}_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function generatePDF(data, columns, title, filename, logo = null, logoSize = 80) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'mm', 'a4');
            const pageW = doc.internal.pageSize.getWidth();
            let y = 12;
            if (logo) {
                doc.addImage(logo, 'JPEG', pageW / 2 - 30, y, 60, 20);
                y += 24;
            }
            doc.setFontSize(16);
            doc.text(title, pageW / 2, y, { align: 'center' });
            y += 8;
            doc.setFontSize(10);
            doc.text(`${appData.systemSettings.companyName} | ${new Date().toLocaleString()}`, pageW / 2, y, { align: 'center' });
            y += 8;
            const headers = columns.map(c => c.header);
            const rows = data.map(row => columns.map(c => String(row[c.key] !== undefined ? row[c.key] : '')));
            doc.autoTable({
                head: [headers],
                body: rows,
                startY: y + 4,
                styles: { fontSize: 8, cellPadding: 2 },
                headStyles: { fillColor: [31, 111, 235], textColor: [255, 255, 255], fontSize: 8, fontStyle: 'bold' },
                columnStyles: { 0: { cellWidth: 'auto' } },
                margin: { left: 8, right: 8 }
            });
            doc.save(`${filename}_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        function generateCSV(data, columns, filename) {
            let csv = columns.map(c => c.header).join(',') + '\n';
            data.forEach(row => {
                csv += columns.map(c => {
                    let val = row[c.key] !== undefined ? String(row[c.key]) : '';
                    if (val.includes(',')) val = `"${val}"`;
                    return val;
                }).join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }

                if (isCredit) { const inp = document.getElementById('cashTenderedInput'); if (inp) inp.value = '0'; }
            }
        };

        window.completeSaleWrapper = function() {
            selectedPayment = document.getElementById('paymentMethod')?.value || "Cash";
            cashTendered = parseFloat(document.getElementById('cashTenderedInput')?.value || 0);
            discount = parseFloat(document.getElementById('discountInput')?.value || 0);
            loyaltyPointsUsed = parseFloat(document.getElementById('loyaltyUse')?.value || 0);
            cartRemarks = document.getElementById('cartRemarksInput')?.value || "";
            completeSale();
        };

        function completeSale() {
            if (!posCart.length) { alert("Add services to cart!"); return; }
            const total = calcTotal();
            const isCredit = selectedPayment === 'Credit (Utang)';
            if (isCredit && !selectedCustomer) { alert("Select a customer for credit!"); return; }
            if (selectedPayment === "Cash" && cashTendered < total) { alert("Insufficient cash!"); return; }

            const staffMap = new Map();
            posCart.forEach(item => {
                if (item.assignedStaff) {
                    item.assignedStaff.forEach(st => {
                        const cur = staffMap.get(st.id) || { commission: 0, jobs: 0, name: st.name,
                            tier: st.commissionTier };
                        cur.commission += st.splitCommission;
                        cur.jobs += 1;
                        staffMap.set(st.id, cur);
                    });
                }
            });

            const receiptNo = generateReceiptNo();
            const tx = {
                id: receiptNo,
                date: new Date().toISOString(),
                customer: selectedCustomer ? selectedCustomer.name : "Walk-in Customer",
                customerId: selectedCustomer?.id || null,
                vehicle: vehicleInfo.model || "N/A",
                plate: vehicleInfo.plate || "N/A",
                items: posCart.map(i => ({ ...i })),
                staffCommissions: Object.fromEntries([...staffMap.entries()]),
                subtotal: calcSubtotal(),
                discount,
                loyaltyUsed: loyaltyPointsUsed,
                total,
                paymentMethod: selectedPayment,
                isCredit: isCredit,
                cashTendered: selectedPayment === "Cash" ? cashTendered : total,
                change: selectedPayment === "Cash" ? (cashTendered - total) : 0,
                remarks: cartRemarks + (isCredit ? ' (CREDIT - PENDING)' : ''),
                itemRemarks: posCart.map(i => ({ service: i.serviceName, remark: i.remarks || 'None' }))
            };

            appData.transactions.unshift(tx);
            staffMap.forEach((data, staffId) => {
                const st = appData.staff.find(s => s.id === staffId);
                if (st) {
                    st.totalCommission = (st.totalCommission || 0) + data.commission;
                    st.jobsCompleted = (st.jobsCompleted || 0) + data.jobs;
                    st.salesGenerated = (st.salesGenerated || 0) + tx.items.filter(i => i.assignedStaff?.some(s =>
                        s.id === staffId)).reduce((sum, i) => sum + i.total, 0);
                }
            });

            if (selectedCustomer && !isCredit) {
                const pts = Math.floor(total * appData.systemSettings.loyaltyPointsPerPeso);
                selectedCustomer.loyaltyPoints = (selectedCustomer.loyaltyPoints || 0) + pts;
                const idx = appData.customers.findIndex(c => c.id === selectedCustomer.id);
                if (idx !== -1) appData.customers[idx].loyaltyPoints = selectedCustomer.loyaltyPoints;
            }

            updateTransactionReports(tx);
            saveToLocal();
            recalcAllCommissions();
            generatePeriodicReport('weekly');
            generatePeriodicReport('monthly');
            generatePeriodicReport('yearly');
            addActivityLog('Sale Completed', `${tx.id} - ₱${total.toFixed(2)} - ${selectedPayment}`);
            addAuditTrail('Sale Completed', `${tx.id} - ₱${total.toFixed(2)} - ${selectedPayment}`, tx.id, 'transaction');

            printDualReceipts(tx);
            alert(`✅ Sale Complete!\nTotal: ₱${total.toFixed(2)}${isCredit ? '\n⚠️ CREDIT (UTANG) - PENDING' : ''}`);
            posCart = [];
            selectedCustomer = null;
            vehicleInfo = { plate: "", model: "", size: "Medium" };
            discount = 0;
            loyaltyPointsUsed = 0;
            cashTendered = 0;
            cartRemarks = "";
            renderApp();
        }

        window.saveAsOpenService = function() {
            if (!posCart.length) { alert("Add services to cart!"); return; }
            const cust = selectedCustomer ? selectedCustomer.name : prompt("Customer name:") || "Walk-in Customer";
            const veh = vehicleInfo.model || prompt("Vehicle model:") || "N/A";
            const plat = vehicleInfo.plate || prompt("Plate number:") || "N/A";
            const total = calcTotal();
            const staff = posCart.flatMap(i => i.assignedStaff || []).filter((v, i, a) => a.findIndex(t => t.id === v
            .id) === i);
            const os = {
                id: "OS-" + new Date().getFullYear() + "-" + (appData.nextIds.openService++),
                customer: cust,
                vehicle: veh,
                plate: plat,
                items: posCart.map(i => ({ ...i })),
                total: total,
                staff: staff,
                remarks: cartRemarks,
                status: 'pending',
                createdAt: new Date().toISOString(),
                completedAt: null,
                paidAt: null,
                commissionProcessed: false
            };
            appData.openServices.push(os);
            saveToLocal();
            addActivityLog('Open Service Created', `${cust} - ₱${total.toFixed(2)}`);
            alert(`✅ Open Service saved!\nTotal: ₱${total.toFixed(2)}`);
            posCart = [];
            selectedCustomer = null;
            vehicleInfo = { plate: "", model: "", size: "Medium" };
            discount = 0;
            loyaltyPointsUsed = 0;
            cartRemarks = "";
            renderApp();
        };

        // ─── OPEN SERVICES ───────────────────────────────────────────
        function renderOpenServices() {
            if (showLogin) return renderLogin();
            const pending = appData.openServices.filter(s => s.status === 'pending' || s.status === 'in-progress');
            const completed = appData.openServices.filter(s => s.status === 'completed' || s.status === 'paid');
            let pendingHtml = pending.map(s => `
                <div class="glass p-4 rounded-lg border border-[#30363d] open-service-card">
                    <div class="flex justify-between items-start">
                        <div><div class="font-bold text-lg">${s.customer}</div><div class="text-sm text-gray-400">${s.vehicle} | ${s.plate}</div>
                        <div class="text-xs text-gray-500">${new Date(s.createdAt).toLocaleString()}</div>
                        <div class="mt-2 space-y-1">${s.items.map(i => `<div class="text-sm"><span class="text-cyan-300">${i.serviceName}</span> (${i.variant}) x${i.quantity} - ₱${i.total}</div>`).join('')}</div>
                        <div class="mt-2 text-xs text-gray-400">Staff: ${s.staff.map(st=>st.name).join(', ') || 'Unassigned'}</div>
                        ${s.remarks ? `<div class="text-xs text-yellow-400 mt-1">📝 ${s.remarks}</div>` : ''}</div>

                        <button onclick="updateOS('${s.id}','completed')" class="action-btn bg-[#3fb950] text-white hover:bg-[#2ea043] text-xs">Complete</button>
                        <button onclick="deleteOS('${s.id}')" class="action-btn bg-[#f85149] text-white hover:bg-[#da3633] text-xs">Delete</button></div></div></div>

                    <div class="flex justify-between items-start">
                        <div><div class="font-bold text-lg text-green-400">${s.customer}</div>

                        <div class="text-xs text-gray-500">Completed: ${new Date(s.completedAt).toLocaleString()}</div>
                        ${s.commissionProcessed ? `<div class="text-xs text-green-400">✅ Commission: Processed</div>` : `<div class="text-xs text-yellow-400">⏳ Commission: Pending</div>`}
                        ${s.transactionId ? `<div class="text-xs text-cyan-400">📄 TX: ${s.transactionId}</div>` : ''}

                        <div class="text-right"><div class="text-xl font-bold text-green-400">₱${s.total.toFixed(2)}</div>

                        ${s.status==='completed'||s.status==='paid' ? `<button onclick="showPayModal('${s.id}')" class="action-btn bg-[#1f6feb] text-white hover:bg-[#1a5fd0] mt-2 text-xs w-full">${s.status==='paid'?'Re-Print':'Pay'}</button>` : ''}

                    <div class="flex gap-2 flex-wrap">

        window.updateOS = function(id, status) {
            const s = appData.openServices.find(s => s.id === id);
            if (!s) return;
            s.status = status;
            if (status === 'completed') { s.completedAt = new Date().toISOString();
                processOSCommission(s, true);
                addActivityLog('Open Service Completed', `${s.customer} - ₱${s.total.toFixed(2)}`);
                recalcAllCommissions(); }
            saveToLocal();
            renderApp();
        };

        function processOSCommission(s, suppressTx = false) {
            if (s.commissionProcessed) return;
            if (!s.staff || !s.staff.length) return;
            const map = new Map();
            s.items.forEach(item => {
                if (item.assignedStaff && item.assignedStaff.length) {
                    item.assignedStaff.forEach(st => {
                        const comm = getCommissionAmount(item.serviceName, item.variant, st
                            .commissionTier);
                        const split = item.assignedStaff.length === 2 ? comm / 2 : comm;
                        const cur = map.get(st.id) || { commission: 0, jobs: 0, name: st.name,
                            tier: st.commissionTier, serviceTotal: 0 };
                        cur.commission += split;
                        cur.jobs += 1;
                        cur.serviceTotal += item.total;
                        map.set(st.id, cur);
                    });
                }
            });
            s.pendingCommission = {
                staffMap: Object.fromEntries([...map.entries()].map(([id, d]) => [id, { commission: d.commission,
                    tier: d.tier, name: d.name, jobs: d.jobs }])),
                total: s.total
            };
            if (!suppressTx) finalizeServiceTx(s);
            else { s.commissionProcessed = true;
                saveToLocal(); }
        }

        function finalizeServiceTx(s) {
            if (!s.pendingCommission) { processOSCommission(s, false); if (!s.pendingCommission) return; }
            const staffMap = s.pendingCommission.staffMap || {};
            const receiptNo = generateReceiptNo();
            const tx = {
                id: receiptNo,
                date: s.completedAt || new Date().toISOString(),
                customer: s.customer,
                vehicle: s.vehicle,
                plate: s.plate,
                items: s.items.map(i => ({ ...i })),
                staffCommissions: staffMap,
                subtotal: s.total,
                discount: 0,
                loyaltyUsed: 0,
                total: s.total,
                paymentMethod: 'Open Service (Completed)',
                cashTendered: s.total,
                change: 0,
                remarks: s.remarks + ' (Completed Service)',
                isOpenService: true,
                openServiceId: s.id,
                isCommissionAutoGenerated: true
            };
            const existing = appData.transactions.find(t => t.openServiceId === s.id && t
            .isCommissionAutoGenerated);
            if (!existing) {
                appData.transactions.unshift(tx);
                updateTransactionReports(tx);
                Object.entries(staffMap).forEach(([sid, data]) => {
                    const st = appData.staff.find(st => st.id === parseInt(sid));
                    if (st) {
                        st.totalCommission = (st.totalCommission || 0) + data.commission;
                        st.jobsCompleted = (st.jobsCompleted || 0) + data.jobs;
                        st.salesGenerated = (st.salesGenerated || 0) + s.total;
                    }
                });
                s.commissionProcessed = true;
                s.transactionId = tx.id;
                delete s.pendingCommission;
                saveToLocal();
                recalcAllCommissions();
                renderApp();
            }
        }

        window.deleteOS = function(id) {
            if (!confirm("Delete this open service?")) return;
            const s = appData.openServices.find(s => s.id === id);
            if (s) addActivityLog('Open Service Deleted', `${s.customer}`);
            appData.openServices = appData.openServices.filter(s => s.id !== id);
            saveToLocal();
            renderApp();
        };

        window.showPayModal = function(id) {
            const s = appData.openServices.find(s => s.id === id);
            if (!s) return;
            const methods = appData.systemSettings.defaultPaymentMethods || ['Cash', 'GCash', 'Maya', 'Credit Card',
                'Bank Transfer', 'Credit (Utang)'
            ];
            const opts = methods.map(m => `<option>${m}</option>`).join('');
            const isPaid = s.status === 'paid';
            let modal = `<div id="payModal" class="modal-overlay"><div class="modal-box">
                <h3 class="text-xl font-bold mb-4">${isPaid ? 'Reprint Receipt' : 'Complete Payment'}</h3>
                <div class="space-y-3">
                    <div><label class="text-gray-400">Customer</label><div class="bg-[#0d1117] p-2 rounded">${s.customer}</div></div>
                    <div><label class="text-gray-400">Total</label><div class="bg-[#0d1117] p-2 rounded text-2xl font-bold text-green-400">₱${s.total.toFixed(2)}</div></div>
                    ${isPaid ? `<div class="text-xs text-green-400">✅ Paid on ${new Date(s.paidAt).toLocaleString()}</div>` : ''}
                    ${s.commissionProcessed ? `<div class="text-xs text-green-400">✅ Commission processed</div>` : `<div class="text-xs text-yellow-400">⏳ Commission pending</div>`}
                    ${!isPaid ? `
                    <div><label class="text-gray-400">Payment</label><select id="payMethod" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded">${opts}</select></div>
                    <div id="cashDiv"><label class="text-gray-400">Cash Tendered</label><input type="number" id="payCash" class="w-full bg-[#0d1117] border border-[#30363d] p-2 rounded" step="0.01"></div>
                    ` : ''}
                    <div class="flex gap-3 mt-4">
                        ${!isPaid ? `<button onclick="confirmPay('${id}')" class="btn-primary flex-1">Complete Payment</button>` : `<button onclick="reprintReceipt('${id}')" class="btn-primary flex-1"><i class="fas fa-print"></i> Reprint</button>`}
                        <button onclick="document.getElementById('payModal')?.remove()" class="btn-secondary flex-1">Cancel</button>
                    </div>
                </div>
            </div></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
            if (!isPaid) {
                document.getElementById('payMethod').addEventListener('change', function() {
                    document.getElementById('cashDiv').style.display = this.value === 'Cash' ? 'block' : 'none';
                });
            }
        };

        window.confirmPay = function(id) {
            const method = document.getElementById('payMethod')?.value || 'Cash';
            const cash = parseFloat(document.getElementById('payCash')?.value || 0);
            completeOSP(id, method, cash);
            document.getElementById('payModal')?.remove();
        };

        window.reprintReceipt = function(id) {
            const s = appData.openServices.find(s => s.id === id);
            if (!s) return;
            const tx = appData.transactions.find(t => t.openServiceId === s.id);
            if (tx) printDualReceipts(tx);
            else alert("No transaction found for this service.");
            document.getElementById('payModal')?.remove();
        };

        function completeOSP(id, method, cash) {
            const s = appData.openServices.find(s => s.id === id);
            if (!s) return;
            const total = s.total;
            if (method === "Cash" && cash < total) { alert("Insufficient cash!"); return; }
            if (!s.commissionProcessed) processOSCommission(s, false);
            else if (s.commissionProcessed && !s.transactionId) finalizeServiceTx(s);

            const existing = appData.transactions.find(t => t.openServiceId === s.id && t
            .isCommissionAutoGenerated);
            if (existing) {
                existing.paymentMethod = method;
                existing.cashTendered = method === "Cash" ? cash : total;
                existing.change = method === "Cash" ? (cash - total) : 0;
                existing.isCredit = method === 'Credit (Utang)';
                if (method === 'Credit (Utang)') existing.remarks = (existing.remarks || '') +
                ' (CREDIT - PENDING)';
                updateTransactionReports(existing);
                saveToLocal();
            } else {
                const r = generateReceiptNo();
                const tx = {
                    id: r,
                    date: new Date().toISOString(),
                    customer: s.customer,
                    vehicle: s.vehicle,
                    plate: s.plate,
                    items: s.items.map(i => ({ ...i })),
                    subtotal: total,
                    discount: 0,
                    loyaltyUsed: 0,
                    total: total,
                    paymentMethod: method,
                    cashTendered: method === "Cash" ? cash : total,
                    change: method === "Cash" ? (cash - total) : 0,

                    isOpenService: true,

                    staffCommissions: s.staffCommissions || {}
                };
                appData.transactions.unshift(tx);
                updateTransactionReports(tx);
                saveToLocal();
                recalcAllCommissions();
            }
            if (method === 'Credit (Utang)') {
                appData.credits.push({
                    id: 'CR-' + new Date().getFullYear() + '-' + (appData.nextIds.credit++),
                    customerName: s.customer,

                });

        // ─── DASHBOARD ───────────────────────────────────────────────
        function getChartData(period) {
            const now = new Date();
            let labels = [],
                data = [];
            if (period === 'daily') {
                for (let i = 29; i >= 0; i--) {
                    const d = new Date(now);
                    d.setDate(now.getDate() - i);
                    const ds = d.toISOString().slice(0, 10);
                    labels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                    const dayTx = appData.transactions.filter(t => t.date.startsWith(ds));
                    data.push(dayTx.reduce((s, t) => s + t.total, 0));
                }
            } else if (period === 'weekly') {
                for (let i = 11; i >= 0; i--) {
                    const ws = getWeekStart(new Date(now.getTime() - 7 * i * 86400000));
                    const wsStr = ws.toISOString().slice(0, 10);
                    const weStr = getWeekEnd(ws).toISOString().slice(0, 10);
                    labels.push(`W${12-i}`);
                    const wkTx = appData.transactions.filter(t => t.date >= wsStr && t.date <= weStr);
                    data.push(wkTx.reduce((s, t) => s + t.total, 0));
                }
            } else if (period === 'monthly') {
                for (let i = 11; i >= 0; i--) {
                    const d = new Date(now);
                    d.setMonth(now.getMonth() - i);
                    const m = d.getMonth(),
                        y = d.getFullYear();
                    labels.push(d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }));
                    const mTx = appData.transactions.filter(t => { const td = new Date(t.date); return td.getMonth() ===
                            m && td.getFullYear() === y; });
                    data.push(mTx.reduce((s, t) => s + t.total, 0));
                }
            }
            return { labels, data };
        }
